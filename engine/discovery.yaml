# Reusable discovery — the questions a planner asks BEFORE writing files. Structured by target so it
# is not rewritten in every flow: `new-system.md` uses `new_system`; `change.md` uses `change` and
# picks the blocks for its `change_type`. Ask in ONE grouped batch, default the rest (record as
# assumptions with assumed:true), and stop as soon as the artifacts would `verify` PASS.

# ── Discovering a brand-new system (new-system.md, Phase 1) ─────────────────────────────
new_system:
  blocks:
    - { id: product,      ask: "name · one-line promise · who uses it",                 fills: "profile.product + description intro" }
    - { id: jobs,         ask: "top 3–7 user outcomes",                                  fills: "description Primary jobs + FEAT- seeds" }
    - { id: apps,         ask: "each app/repo (backend api · web portals · admin · landing · mobile) + framework; which is the default backend", fills: "profile.apps + default_app + subtypes" }
    - { id: domains,      ask: "the major areas of the system",                          fills: "DOM- nodes" }
    - { id: data,         ask: "the main entities/collections + their key fields + owning domain", fills: "ENT- nodes in map/data/<domain>/ (+ spec.fields)" }
    - { id: integrations, ask: "external services + their secrets",                      fills: "profile.integrations + integration nodes" }
    - { id: rules,        ask: "auth model · tenancy · perf targets · pagination · audit", fills: "map/rules.yaml + profile.conventions" }
    - { id: constraints,  ask: "compliance · regions · budgets · non-negotiables",       fills: "rules or description" }

# ── Discovering a change (change.md, Phase 1) ───────────────────────────────────────────
# `mandatory` blocks are always asked; the rest are asked unless `skip_when` matches the change_type.
change:
  blocks:
    - { id: core,       mandatory: true,  ask: "type & owner · intent (one sentence) · out-of-scope · priority",        fills: "change.yaml" }
    - { id: behavior,   mandatory: true,  ask: "the main path, step by step — exactly what happens",                    fills: "delta spec + plan steps" }
    - { id: data,       skip_when: [modify-page, modify-endpoint-io-only, refactor], ask: "new/changed entities (+ owning domain), fields, collections, providers, async jobs", fills: "entity files in map/data/<domain>/ + data-kind deltas (spec.fields)" }
    - { id: interface,  skip_when: [refactor], ask: "endpoints (route/auth/request/response) and pages (which app/repo · components/wiring/states) touched", fills: "surface + ui deltas (spec; ui carries app)" }
    - { id: security,   skip_when: [auth-unchanged-and-no-new-endpoints], ask: "who may trigger · ownership checks · sensitive data · audit", fills: "node.rules + spec.auth" }
    - { id: edge_cases, skip_when: [pure-ui-no-backend], ask: "invalid input · not-found · concurrency · external failure · rollback", fills: "spec.edge_cases" }
    - { id: acceptance, mandatory: true,  ask: "the testable outcomes that mean done",                                   fills: "change.acceptance + step.accept" }

  # change_type vocabulary (mirror of change.yaml.type + finer intents used only for skip logic)
  types: [new-feature, new-module, new-app, modify-feature, modify-endpoint, modify-page, modify-service, modify-data-model, refactor, bug-fix]

rule_of_the_interview:
  - "ONE grouped batch; prefer concrete choices over open prompts."
  - "Ask only what changes a decision; default the rest and record as assumptions[] {q,value,assumed:true}."
  - "Every planned artifact leaves with a full `spec` (see conventions.md → spec_by_kind)."
  - "Stop when the artifacts would verify PASS. Never interrogate."
