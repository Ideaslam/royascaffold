# index.yaml — GENERATED by `roya index`. Never hand-written. Lives in project/map/index.yaml.
# This is the queryable registry + graph. verify proves it is fresh (source_hash) every run.

index:
  fields:
    generated_at: { type: string, doc: "ISO timestamp" }
    source_hash:  { type: string, doc: "sha256 of all map/**.yaml (except index) — freshness signal" }
    totals:       { type: object, doc: "count of nodes per kind" }
    status_rollup:{ type: object, doc: "per kind: { implemented, partial, planned, deferred }" }
    graph:        { type: object, doc: "per node: { kind, status, calls, used_by, deps, implemented_by, rules, module, source }" }
    backlog:      { type: object[], doc: "every open change/bug: { id, type, title, owner, status, current_step, targets, conflicts }" }

note: |
  The graph is bidirectional: `calls`/`deps` come from the nodes, `used_by`/`implemented_by` are
  derived. That answers both "what does EP-X call?" and "what calls SVC-Y?" from one lookup.
