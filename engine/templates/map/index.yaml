# SHAPE REFERENCE — GENERATED by `roya index`. Do NOT hand-write project/map/index.yaml.
# Shown so you know what the registry + graph look like. verify checks it is fresh (source_hash).

generated_at: "<ISO timestamp>"
source_hash: "sha256:<hash of all map files>"   # freshness signal; verify recomputes and compares
totals:                                          # node count per kind
  surface: 0
  logic: 0
  data: 0
status_rollup:                                   # per kind: how many in each status
  surface: { implemented: 0, partial: 0, planned: 0, deferred: 0 }
graph:                                            # every node + its resolved edges (both directions)
  "<ID>":
    calls: ["<ID.method>"]
    used_by: ["<ID>"]                            # reverse edge, computed
    deps: ["<ID>"]
    implements: ["<IF-ID>"]
    implemented_by: ["<SVC-ID>"]                 # reverse of implements
    rules: ["RULE-..."]
    kind: surface
    status: implemented
    module: "<module>"
    source: "map/modules/<module>.yaml"
backlog:                                          # every open change/bug
  - id: "change-NNN"
    type: feature
    title: "<title>"
    owner: business
    status: planned
    current_step: 1
    targets: ["<ID>"]
    conflicts: ["<other change id touching the same node>"]
