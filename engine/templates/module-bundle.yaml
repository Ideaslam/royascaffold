# TEMPLATE — one module bundle. Copy to project/map/modules/<module>.yaml and fill.
# Rules: IMPLEMENTED nodes stay light (code is the truth via @map). PLANNED nodes carry a full
# `spec` (see conventions.md → spec_by_kind). A spec records ONLY deviations from profile.conventions.
# One bundle per module — never one file per method. Delete the kinds you don't use.
# Placeholders are quoted so this file stays valid YAML; drop the quotes when you fill real values.
#
# APP / REPOSITORY assignment — every implementation node belongs to one or more apps from
# profile.yaml → apps. Server-side kinds (surface/logic/contract/data/integration/flow) DEFAULT to
# profile.default_app, so you only set `apps:` on them to override. UI nodes MUST carry `app: <key>`
# (single) or `apps: [<key>, ...]` (shared across repos). Features & modules span the union of their
# members automatically — never set apps on them. The viewer's Apps view is built from this.
#
# The 12 universal KINDS (full descriptions in engine/kinds.yaml; short reminders inline below):
#   module      — a code module: one bundle of related nodes (this file's header).
#   feature     — a user-facing grouping of nodes (carries the detailed narrative).
#   data        — a persisted shape (entity/collection/table).
#   contract    — an interface / port plus its DI token.
#   logic       — behavior with no I/O surface of its own (service/worker/handler).
#   surface     — an externally reachable entry point (endpoint/webhook/cli/event).
#   ui          — something rendered for a human (page/component/layout/theme).
#   integration — an adapter to an external provider (declared in operational/profile).
#   flow        — async or scheduled work (queue/worker/cron); usually in operational.yaml.
#   rule/boundary/domain — cross-cutting; live in map/rules.yaml + map/architecture/.

module: "<module>"                 # lowercase; becomes MOD-<MODULE>  (kind: module)
owner: "DOM-<DOMAIN>"             # the domain that owns this module
status: planned                   # planned | partial | implemented (+ reason if partial)

# doc — human-readable description of this MODULE. Free-text; ignored by verify. The viewer renders it.
#   short       one-liner shown in lists.
#   description detailed paragraph — what it is, what it owns, how it fits.
#   rules       list of the constraints/policies that govern it (plain sentences, not RULE- ids;
#               the enforceable RULE- references stay on the individual nodes' `rules:` field).
doc:
  short: "<one-liner: what this module is>"
  description: "<detailed: responsibilities, what it owns, how it fits the system>"
  rules:
    - "<a constraint this module obeys>"

# kind: feature — a user-facing grouping of nodes; carries the detailed narrative (what + why).
features:
  - id: "FEAT-<MODULE>-<NAME>"
    name: "<Human name>"
    visibility: both               # both | backend-only | frontend-only | admin-panel
    uses: ["EP-...", "SVC-...", "PAGE-..."]
    doc:                           # human description of this FEATURE (viewer renders it)
      short: "<one-liner>"
      description: "<detailed: the user outcome and how it works>"
      rules: ["<a constraint this feature obeys>"]
    spec:                          # the detailed BUILD contract (what + why) — required when planned
      narrative: "what this feature does and why it exists"
      rules: ["RULE-..."]
      acceptance: ["testable outcome 1", "testable outcome 2"]
      edge_cases: ["invalid input", "not-found", "external failure"]

nodes:
  # ── ENTITIES (kind: data, subtype: entity/collection) DO NOT live here. ──
  #    Entities are domain-owned and shared across modules, so each one is its own file at
  #    project/map/data/<domain>/<entity>.yaml (copy engine/templates/entity.yaml to create one).
  #    A module "uses" an entity through its logic `deps: [ENT-...]` — the viewer derives the
  #    module's "Entities used" list from those deps. Never redefine an entity in a module bundle.

  # ── DTOs (request/response payload shapes) DO NOT live here either. ──
  #    They are module-owned but kept in project/map/data/dto/<module>.yaml (copy
  #    engine/templates/dto.yaml). A surface links to them via receives:/returns: below.

  # ── contract — an interface / port plus its DI token ──
  - id: "IF-<NAME>"
    kind: contract
    subtype: interface
    status: planned
    di_token: "<TOKEN>"
    methods: [doThing]
    implemented_by: ["SVC-<NAME>"]

  # ── logic — behavior with no I/O surface of its own (service/worker/handler) ──
  - id: "SVC-<NAME>"
    kind: logic
    subtype: service
    status: planned
    implements: ["IF-<NAME>"]
    deps: ["ENT-<NAME>"]
    methods: [create, list, findOne]
    spec:
      methods:
        - { sig: "create(dto): <Name>", does: "validate + persist", side_effects: none }
        - { sig: "list(q): Paginated<Name>", does: "paginated query", side_effects: none }

  # ── surface — an externally reachable entry point (endpoint/webhook/cli/event) ──
  #    receives: = request body DTO · returns: = response DTO or the entity itself.
  #    Path params are auto-derived from the route (`:id`) — only list them in spec.request.params
  #    to add a type/note. Query string goes in spec.request.query. Pagination/envelope are inherited
  #    from profile.conventions, so document them only when they DEVIATE.
  - id: "EP-<MODULE>-01"
    kind: surface
    subtype: rest.post
    status: planned
    calls: ["SVC-<NAME>.create"]
    receives: ["DTO-<NAME>-CREATE"]       # request body shape (a dto node in map/data/dto/<module>.yaml)
    returns: ["ENT-<NAME>"]               # response shape — often the entity itself
    spec:
      route: "POST /<resource>"
      auth: "role, or omit when it equals the conventions default"
      request:
        # params: [{ name: id, in: path, type: ObjectId, required: true }]   # only to add type/note
        query: [{ name: page, type: number, required: false }]               # omit if none
        body: "DTO-<NAME>-CREATE"
      response: { status: 201, body: "ENT-<NAME>" }
      errors: [{ code: 401, when: unauthenticated }, { code: 422, when: validation failed }]

  # ── ui — something rendered for a human (page/component/layout/theme) ──
  #    REQUIRED: `app` (which repo it ships in) — or `apps: [..]` if shared across frontends.
  - id: "PAGE-<NAME>"
    kind: ui
    subtype: page
    status: planned
    app: customer-portal              # which app/repo this page lives in (profile.apps key)
    calls: ["EP-<MODULE>-01"]
    spec:
      route: "/app/<resource>"
      components: [FilterBar, DataTable, Paginator]
      wires: ["EP-<MODULE>-01 -> list rows"]
      guard: AuthGuard
      # states omitted -> inherits conventions.ui.states (loading/empty/error/success)
