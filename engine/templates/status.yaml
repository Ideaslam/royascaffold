# SHAPE REFERENCE — GENERATED by `roya index` (alongside status.md). Do NOT hand-write project/status.yaml.
# The machine-readable board: what is implemented, the full backlog + owners, and what needs attention.

generated_at: "<ISO timestamp>"
totals:                                  # node count per kind
  surface: 0
  logic: 0
status_rollup:                           # per kind: counts by status
  surface: { implemented: 0, partial: 0, planned: 0, deferred: 0 }
backlog:                                 # every open change/bug (features + bugs, one board)
  - id: "change-NNN"
    type: feature                        # feature | bug | refactor
    title: "<title>"
    owner: business                      # business | support | dev
    status: planned
    current_step: 1
    targets: ["<ID>"]
    conflicts: ["<other change id>"]
attention:                               # nodes needing follow-up (partial / deferred + reason)
  - { id: "<ID>", kind: flow, status: partial, reason: "<why>" }
