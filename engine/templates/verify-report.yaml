# SHAPE REFERENCE — GENERATED by `roya verify`. Do NOT hand-write project/verify/verify-report.yaml.
# The last verification result. Only status: PASS with 0 errors means the work is done.

status: PASS                             # PASS | STALE | DRIFT | FAIL
checks:
  freshness: FRESH                       # FRESH | STALE (index regenerated?)
  specs: COMPLETE                        # COMPLETE | INCOMPLETE (planned/created nodes carry a spec?)
  links: OK                              # OK | BROKEN (edges + rule refs resolve?)
  conflicts: NONE                        # NONE | FOUND (two open plans touch one node?)
  boundaries: OK                         # OK | WARN | FAIL | SKIPPED (cross-domain edges use contracts?)
  drift: "SKIPPED (no code_roots present)"   # OK | DRIFT | SKIPPED (map <-> @map code)
  size: "SKIPPED (no code_roots configured)" # OK | OVER | SKIPPED (map_size_budget)
errors: []                               # each entry blocks PASS (e.g. BROKEN_LINK, DUPLICATE_ID, SPEC_MISSING as error)
warnings:                                # non-blocking, but read them
  - "CROSS_PLAN_CONFLICT <ID> touched by <change-a>, <change-b>"
summary:
  nodes: 0
  rules: 0
  changes: 0
  errors: 0
  warnings: 0
