<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roya System Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
  <!-- Toolbar -->
  <header class="sticky top-0 z-50 border-b border-slate-200 bg-white/95 backdrop-blur shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center text-sm font-bold shrink-0">R</div>
        <div class="min-w-0">
          <h1 id="product-title" class="text-lg font-semibold truncate text-slate-900">Roya System Viewer</h1>
          <p id="product-summary" class="text-xs text-slate-500 truncate hidden sm:block"></p>
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <span id="verify-badge" class="hidden px-2 py-1 rounded text-xs font-medium"></span>
        <button onclick="location.hash='#/'" class="px-3 py-1.5 text-sm rounded-lg bg-white hover:bg-slate-50 border border-slate-300 text-slate-700 transition hidden sm:inline">
          Overview
        </button>
        <button onclick="location.hash='#/data'" class="px-3 py-1.5 text-sm rounded-lg bg-white hover:bg-slate-50 border border-slate-300 text-slate-700 transition">
          Data Model
        </button>
        <select id="app-jump" class="px-2 py-1.5 text-sm rounded-lg bg-white border border-slate-300 text-slate-700 transition hidden sm:inline">
          <option value="">Apps…</option>
        </select>
        <button id="btn-refresh" class="px-3 py-1.5 text-sm rounded-lg bg-white hover:bg-slate-50 border border-slate-300 text-slate-700 transition">
          Refresh
        </button>
        <button id="btn-verify" class="px-3 py-1.5 text-sm rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white transition">
          Verify
        </button>
        <button disabled title="Coming soon" class="px-3 py-1.5 text-sm rounded-lg bg-slate-100 border border-slate-200 text-slate-400 cursor-not-allowed">
          Graph (soon)
        </button>
      </div>
    </div>
    <nav id="breadcrumbs" class="max-w-7xl mx-auto px-4 pb-2 flex items-center gap-1 text-sm text-slate-500 overflow-x-auto"></nav>
  </header>

  <main id="content" class="max-w-7xl mx-auto px-4 py-6">
    <div class="flex items-center justify-center py-24 text-slate-500">Loading…</div>
  </main>

  <!-- Verify drawer -->
  <div id="verify-drawer" class="fixed inset-y-0 right-0 w-full max-w-md bg-white border-l border-slate-200 shadow-2xl transform translate-x-full transition-transform duration-200 z-50 flex flex-col">
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200">
      <h2 class="font-semibold text-slate-900">Verify Report</h2>
      <button id="close-drawer" class="text-slate-400 hover:text-slate-700 text-xl leading-none">&times;</button>
    </div>
    <div id="verify-drawer-body" class="flex-1 overflow-y-auto p-4 text-sm text-slate-700"></div>
  </div>
  <div id="drawer-backdrop" class="fixed inset-0 bg-slate-900/20 hidden z-40"></div>

  <script src="/app.js"></script>
</body>
</html>
