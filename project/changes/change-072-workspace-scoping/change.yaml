id: change-072
title: Workspace scoping for users
type: feature
owner: business
status: in_progress
rationale: "Scope users (and the users query) to a workspace so a tenant only sees its own members."
acceptance:
  - "ENT-USER carries workspaceId (ref Workspace) and is workspace-scoped"
  - "EP-USER-GET accepts a workspaceId query filter"
  - "A new Workspace entity exists"
  - "roya verify = PASS on the effective view"
archetypes: [entity.workspace-scoped, endpoint.crud-list]
