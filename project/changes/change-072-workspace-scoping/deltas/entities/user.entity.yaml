# The workspaceId field is PLANNED here — the map still shows ENT-USER without it. This is exactly
# the gap that broke v1: a fresh AI reads this and knows workspaceId belongs to change-072 and is
# NOT yet implemented. It becomes real only when merge-change.md runs.
target: ENT-USER
change: change-072
status: planned
reason: "Scope users to a workspace"
patch:
  set:
    workspace_scoped: true
  fields:
    add:
      - { name: workspaceId, type: ObjectId, ref: Workspace, required: false, index: true }
  rules:
    add: [RULE-WS-SCOPE-01]
