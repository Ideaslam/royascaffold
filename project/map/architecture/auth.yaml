# Two-layer authorization. Guards are logic nodes; the role model is documented for humans.
# An endpoint's `auth:` field references a level: public | authenticated | role:<sys> | ws-role:<ws>.
nodes:
  - id: SVC-GUARD-JWT
    kind: logic
    subtype: guard
    module: auth
    status: implemented
    rules: [RULE-AUTH-003]
    reason_note: "JWT guard — sole auth mechanism; validates access token at the edge"

  - id: SVC-GUARD-WSROLE
    kind: logic
    subtype: guard
    module: auth
    status: implemented
    reason_note: "Workspace-role guard — DB lookup of WorkspaceRole; never trusts stale JWT claim"

# Documentation only (the loader reads `nodes:`; this block is for humans + a future GUI).
roles:
  system_layer:
    field: UserRole
    values: [admin, editor]
    note: "System-wide platform role. Never used for workspace authorization."
  workspace_layer:
    field: WorkspaceRole
    values: [owner, admin, editor, viewer]
    note: "Per-workspace role, resolved by DB lookup (SVC-GUARD-WSROLE)."
