# Entity ENT-NOTIFICATION — owned by DOM-PLATFORM. Referenced by logic via deps: [ENT-NOTIFICATION].
id: ENT-NOTIFICATION
kind: data
subtype: collection
domain: DOM-PLATFORM
collection: notifications
workspace_scoped: false
status: implemented
spec:
  fields:
    - {name: _id, type: ObjectId, required: true, constraints: PK}
    - {name: userId, type: ObjectId, ref: ENT-USER, required: true, index: true}
    - {name: type, type: String, enum: [dashboard_ready, generation_error, dashboard_shared, invite], required: true}
    - {name: title, type: String, required: true}
    - {name: message, type: String, required: true}
    - {name: relatedEntityType, type: String, required: false, constraints: dashboard | project | ...}
    - {name: relatedEntityId, type: ObjectId, required: false}
    - {name: read, type: Boolean, required: true}
    - {name: createdAt, type: Date}
  relations: many ENT-NOTIFICATION -> one ENT-USER
  indexes:
    - '{ userId, read }'
  enums:
    type: [dashboard_ready, generation_error, dashboard_shared, invite]
