module: ai-logs
owner: DOM-PLATFORM
status: implemented

features:
  - { id: FEAT-AILOG, name: AI Logs + Cost, visibility: admin-panel, uses: [EP-AILOG-01, EP-AILOG-02, SVC-AILOG, PAGE-ADMIN-AILOGS] }

nodes:
  - { id: SVC-AILOG, kind: logic, subtype: repository, status: implemented,
      methods: [create, updateById, findById, findPaginated, costSummary], deps: [ENT-AILOG] }
  - { id: SVC-AILOG-PRICE, kind: logic, subtype: repository, status: implemented,
      methods: [findByModelId, upsert, findAll], deps: [ENT-AI-PRICING] }
  - { id: SVC-AILOG-SEED, kind: logic, subtype: service, status: implemented,
      methods: [onModuleInit], deps: [SVC-AILOG-PRICE], rules: [RULE-ARCH-006] }

  - { id: ENT-AILOG, kind: data, subtype: collection, collection: ailogs, workspace_scoped: false, status: implemented }
  - { id: ENT-AI-PRICING, kind: data, subtype: collection, collection: aimodelpricing, workspace_scoped: false, status: implemented }

  - { id: EP-AILOG-01, kind: surface, subtype: rest.get, route: /api/v1/ai-logs, auth: "role:admin", status: implemented, calls: [SVC-AILOG.findPaginated], rules: [RULE-PAG-01] }
  - { id: EP-AILOG-02, kind: surface, subtype: rest.get, route: /api/v1/ai-logs/cost-summary, auth: "role:admin", status: implemented, calls: [SVC-AILOG.costSummary] }
  - { id: EP-AILOG-03, kind: surface, subtype: rest.get, route: /api/v1/ai-logs/:id, auth: "role:admin", status: implemented, calls: [SVC-AILOG.findById] }

  - { id: PAGE-ADMIN-AILOGS, kind: ui, subtype: page, app: admin-panel, route: /admin/ai-logs, status: implemented,
      calls: [EP-AILOG-01, EP-AILOG-02], theme: THEME-ROYA, states: [loading, empty, error, ready] }
