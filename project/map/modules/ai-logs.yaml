module: ai-logs
owner: DOM-PLATFORM
status: implemented

doc:
  short: "AI call logs, token usage, and cost accounting."
  description: "Records every AI call with its tokens and computed cost (using a per-model pricing table), and exposes cost summaries to admins."
  rules:
    - "Every AI call is logged with tokens and cost"

features:
  - { id: FEAT-AILOG, name: AI Logs + Cost, visibility: admin-panel, uses: [EP-AILOG-01, EP-AILOG-02, SVC-AILOG, PAGE-ADMIN-AILOGS], doc: { short: "Review AI usage and spend.", description: "Admins browse paginated AI logs and cost summaries derived from per-model pricing.", rules: ["Admin-only visibility"] } }

nodes:
  - { id: SVC-AILOG, kind: logic, subtype: repository, status: implemented,
      methods: [create, updateById, findById, findPaginated, costSummary], deps: [ENT-AILOG] }
  - { id: SVC-AILOG-PRICE, kind: logic, subtype: repository, status: implemented,
      methods: [findByModelId, upsert, findAll], deps: [ENT-AI-PRICING] }
  - { id: SVC-AILOG-SEED, kind: logic, subtype: service, status: implemented,
      methods: [onModuleInit], deps: [SVC-AILOG-PRICE], rules: [RULE-ARCH-006] }

  # Entities → project/map/data/platform/ (ENT-AILOG, ENT-AI-PRICING; used by the services below via deps)

  - { id: EP-AILOG-01, kind: surface, subtype: rest.get, route: /api/v1/ai-logs, auth: "role:admin", status: implemented, calls: [SVC-AILOG.findPaginated], rules: [RULE-PAG-01], returns: [DTO-AILOG-01-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-AILOG-01-RES } } }
  - { id: EP-AILOG-02, kind: surface, subtype: rest.get, route: /api/v1/ai-logs/cost-summary, auth: "role:admin", status: implemented, calls: [SVC-AILOG.costSummary], returns: [DTO-AILOG-02-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-AILOG-02-RES } } }
  - { id: EP-AILOG-03, kind: surface, subtype: rest.get, route: /api/v1/ai-logs/:id, auth: "role:admin", status: implemented, calls: [SVC-AILOG.findById], returns: [DTO-AILOG-03-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-AILOG-03-RES } } }
  - { id: PAGE-ADMIN-AILOGS, kind: ui, subtype: page, app: admin-panel, route: /admin/ai-logs, status: implemented,
      calls: [EP-AILOG-01, EP-AILOG-02], theme: THEME-ROYA, states: [loading, empty, error, ready] }
