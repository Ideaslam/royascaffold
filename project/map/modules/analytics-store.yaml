module: analytics-store
owner: DOM-DATA
status: implemented

# OLAP engine layer. Engine-neutral operations resolve the workspace's active OLAP engine via a
# strategy registry (extend-by-registration). Table naming ds_{workspaceSlug}_{datasetId} enforced here.
doc:
  short: "The OLAP store: tables, queries, and chart-data cache."
  description: "An engine-neutral analytics store. Operations resolve the workspace's active OLAP engine (ClickHouse, BigQuery, ...) via a strategy registry, and enforce the ds_{workspaceSlug}_{datasetId} table naming. Also owns the chart-data cache."
  rules:
    - "Analytics tables are named ds_{workspaceSlug}_{datasetId}"
    - "The concrete OLAP engine is resolved per workspace via a registry"

features:
  - { id: FEAT-OLAP, name: Analytics Store, visibility: backend-only, uses: [SVC-OLAP-STORE, SVC-OLAP-ENGINE], doc: { short: "Store, query, and cache analytics data.", description: "Create dataset tables, insert rows, run queries and aggregates, and get/set/invalidate the chart-data cache across pluggable OLAP engines." } }

nodes:
  - { id: IF-OLAP-ENGINE, kind: contract, subtype: interface, status: implemented,
      methods: [createTable, dropTable, insert, query, createView], rules: [RULE-ARCH-006] }
  - { id: SVC-OLAP-ENGINE, kind: logic, subtype: registry, status: implemented,
      methods: [register, resolve], rules: [RULE-ARCH-006] }
  - { id: SVC-OLAP-CH, kind: integration, subtype: sdk, provider: clickhouse, status: implemented,
      implements: [IF-OLAP-ENGINE], deps: [SVC-OLAP-ENGINE] }
  - { id: SVC-OLAP-BQ, kind: integration, subtype: sdk, provider: bigquery, status: implemented,
      implements: [IF-OLAP-ENGINE], deps: [SVC-OLAP-ENGINE] }

  - { id: SVC-OLAP-STORE, kind: logic, subtype: service, status: implemented,
      methods: [createDatasetTable, dropDatasetTable, insertRows, createCanonicalView, runQuery,
                defineAggregate, distinctValues, searchValues, cacheGet, cacheSet, cacheInvalidate],
      deps: [SVC-OLAP-ENGINE], rules: [RULE-GLOBAL-006] }
  - { id: SVC-OLAP-BENCH, kind: logic, subtype: service, status: implemented,
      methods: [runBenchmark, getResult], deps: [SVC-OLAP-STORE, ENT-OLAP-BENCH] }
  # Entities → project/map/data/data-source-engine/ (ENT-OLAP-BENCH; used by the services below via deps)

  # admin benchmark surfaces
  - { id: EP-AS-01, kind: surface, subtype: rest.post, route: /api/v1/admin/olap/benchmark, auth: "role:admin",
      status: implemented, calls: [SVC-OLAP-BENCH.runBenchmark], rules: [RULE-GLOBAL-004] }
  - { id: EP-AS-02, kind: surface, subtype: rest.get, route: /api/v1/admin/olap/benchmark/:id, auth: "role:admin",
      status: implemented, calls: [SVC-OLAP-BENCH.getResult] }

  - { id: PAGE-ADMIN-ANALYTICS-STORE, kind: ui, subtype: page, app: admin-panel, route: /admin/analytics-store, status: implemented,
      calls: [EP-AS-01, EP-AS-02], theme: THEME-ROYA, states: [loading, empty, error, ready] }
