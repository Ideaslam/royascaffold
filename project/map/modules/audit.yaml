module: audit
owner: DOM-PLATFORM
status: implemented

# Global fire-and-forget audit logger — best-effort, never propagates errors (RULE-GLOBAL-010).
features:
  - { id: FEAT-AUDIT, name: Audit Trail, visibility: admin-panel, uses: [EP-AUDIT-01, SVC-AUDIT, PAGE-ADMIN-AUDIT] }

nodes:
  - { id: SVC-AUDIT, kind: logic, subtype: service, status: implemented,
      methods: [log, findPaginated], deps: [ENT-AUDITLOG], rules: [RULE-GLOBAL-010] }

  - { id: ENT-AUDITLOG, kind: data, subtype: collection, collection: auditlogs, workspace_scoped: false, status: implemented }

  - { id: EP-AUDIT-01, kind: surface, subtype: rest.get, route: /api/v1/audit, auth: "role:admin", status: implemented, calls: [SVC-AUDIT.findPaginated], rules: [RULE-PAG-01] }

  - { id: PAGE-ADMIN-AUDIT, kind: ui, subtype: page, app: admin-panel, route: /admin/audit, status: implemented,
      calls: [EP-AUDIT-01], theme: THEME-ROYA, states: [loading, empty, error, ready] }
