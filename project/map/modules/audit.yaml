module: audit
owner: DOM-PLATFORM
status: implemented

# Global fire-and-forget audit logger — best-effort, never propagates errors (RULE-GLOBAL-010).
doc:
  short: "Best-effort audit trail of significant actions."
  description: "A global, fire-and-forget audit logger. Services call it to record significant actions; it is best-effort and never propagates its own errors back to the caller. Admins browse the trail."
  rules:
    - "Audit logging is best-effort and never breaks the calling operation"

features:
  - { id: FEAT-AUDIT, name: Audit Trail, visibility: admin-panel, uses: [EP-AUDIT-01, SVC-AUDIT, PAGE-ADMIN-AUDIT], doc: { short: "Review the audit trail.", description: "Admins browse a paginated log of recorded actions across the system.", rules: ["Admin-only visibility"] } }

nodes:
  - { id: SVC-AUDIT, kind: logic, subtype: service, status: implemented,
      methods: [log, findPaginated], deps: [ENT-AUDITLOG], rules: [RULE-GLOBAL-010] }

  # Entities → project/map/data/platform/ (ENT-AUDITLOG; used by the services below via deps)

  - { id: EP-AUDIT-01, kind: surface, subtype: rest.get, route: /api/v1/audit, auth: "role:admin", status: implemented, calls: [SVC-AUDIT.findPaginated], rules: [RULE-PAG-01] }

  - { id: PAGE-ADMIN-AUDIT, kind: ui, subtype: page, app: admin-panel, route: /admin/audit, status: implemented,
      calls: [EP-AUDIT-01], theme: THEME-ROYA, states: [loading, empty, error, ready] }
