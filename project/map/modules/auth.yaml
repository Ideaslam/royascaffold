module: auth
owner: DOM-PLATFORM
status: implemented

# JWT is the sole auth mechanism (RULE-AUTH-003). Guards live in architecture/auth.yaml
# (SVC-GUARD-JWT, SVC-GUARD-WSROLE). This module owns registration/login/token/verification.
doc:
  short: "Registration, login, tokens, and email verification."
  description: "Owns the credential lifecycle: register, login, OAuth login, token refresh/logout, password reset, and email verification. JWT is the sole auth mechanism; the runtime guards live in architecture/auth.yaml."
  rules:
    - "JWT is the only authentication mechanism"
    - "Passwords are hashed, never stored or returned in plaintext"

features:
  - { id: FEAT-AUTH-LOGIN, name: Register + Login, visibility: both, uses: [EP-AUTH-01, EP-AUTH-02, SVC-AUTH, PAGE-LOGIN], doc: { short: "Register a new account and log in.", description: "Email/password registration and login returning a JWT, plus password reset flows.", rules: ["Credentials validated server-side", "Returns a signed JWT on success"] } }
  - { id: FEAT-AUTH-VERIFY, name: Email Verification, visibility: customer-portal, uses: [EP-AUTH-09, EP-AUTH-10, SVC-AUTH-EMAIL], history: [change-056], doc: { short: "Verify a user's email address.", description: "Issues and checks email-verification tokens and resends verification mail, gating access that requires a verified address.", rules: ["Verification token is single-use and time-bound"] } }

nodes:
  - { id: SVC-AUTH, kind: logic, subtype: service, status: implemented,
      methods: [register, login, oauthLogin, refresh, logout, forgotPassword, resetPassword, verifyEmail, resendVerificationEmail, getProfile, toProfileDto],
      deps: [ENT-USER, SVC-WS, SVC-AUDIT, SVC-AUTH-EMAIL, SVC-EXT-MAIL],
      rules: [RULE-AUTH-001, RULE-AUTH-VERIFY-01, RULE-GLOBAL-010], history: [change-001, change-056] }
  - { id: SVC-AUTH-EMAIL, kind: logic, subtype: service, status: implemented,
      methods: [assertEmailVerified, issueVerificationToken, sendVerificationEmail, sendWelcomeEmail, verifyEmail, resendVerification],
      deps: [ENT-USER, SVC-EXT-MAIL, SVC-EXT-MAIL-TPL], rules: [RULE-AUTH-VERIFY-01, RULE-NOTIF-001], history: [change-056] }
  - { id: SVC-AUTH-JWT, kind: logic, subtype: guard, status: implemented,
      methods: [validate], deps: [ENT-USER, ENT-WS-MEMBERSHIP], rules: [RULE-AUTH-003] }

  # surfaces
  - { id: EP-AUTH-01, kind: surface, subtype: rest.post, route: /api/v1/auth/register, auth: public, status: implemented, calls: [SVC-AUTH.register], rules: [RULE-AUTH-001], history: [change-056] }
  - { id: EP-AUTH-02, kind: surface, subtype: rest.post, route: /api/v1/auth/login, auth: public, status: implemented, calls: [SVC-AUTH.login], rules: [RULE-AUTH-001] }
  - { id: EP-AUTH-03, kind: surface, subtype: rest.post, route: /api/v1/auth/oauth/callback, auth: public, status: partial,
      reason: "OAuth callback handler is a stub — not wired to SVC-AUTH.oauthLogin", intentional_drift: true,
      calls: [SVC-EXT-OAUTH], rules: [RULE-AUTH-OAUTH-01] }
  - { id: EP-AUTH-04, kind: surface, subtype: rest.post, route: /api/v1/auth/refresh, auth: public, status: implemented, calls: [SVC-AUTH.refresh] }
  - { id: EP-AUTH-05, kind: surface, subtype: rest.post, route: /api/v1/auth/forgot-password, auth: public, status: implemented, calls: [SVC-AUTH.forgotPassword] }
  - { id: EP-AUTH-06, kind: surface, subtype: rest.post, route: /api/v1/auth/reset-password, auth: public, status: implemented, calls: [SVC-AUTH.resetPassword] }
  - { id: EP-AUTH-07, kind: surface, subtype: rest.post, route: /api/v1/auth/logout, auth: authenticated, status: implemented, calls: [SVC-AUTH.logout] }
  - { id: EP-AUTH-08, kind: surface, subtype: rest.get, route: /api/v1/auth/me, auth: authenticated, status: implemented, calls: [SVC-AUTH.getProfile] }
  - { id: EP-AUTH-09, kind: surface, subtype: rest.post, route: /api/v1/auth/verify-email, auth: public, status: implemented, calls: [SVC-AUTH.verifyEmail], rules: [RULE-AUTH-VERIFY-01], history: [change-056] }
  - { id: EP-AUTH-10, kind: surface, subtype: rest.post, route: /api/v1/auth/resend-verification, auth: authenticated, status: implemented, calls: [SVC-AUTH.resendVerificationEmail], rules: [RULE-AUTH-VERIFY-01], history: [change-056] }

  # frontend (auth pages)
  - { id: PAGE-LOGIN, kind: ui, subtype: page, app: customer-portal, route: /auth/login, status: implemented,
      calls: [EP-AUTH-02], renders: [CMP-AUTH-FORM], theme: THEME-ROYA, i18n: true, rtl: true, states: [ready, error], history: [change-029] }
  - { id: PAGE-REGISTER, kind: ui, subtype: page, app: customer-portal, route: /auth/register, status: implemented,
      calls: [EP-AUTH-01], renders: [CMP-AUTH-FORM], theme: THEME-ROYA, i18n: true, rtl: true, states: [ready, error] }
  - { id: PAGE-CHECK-EMAIL, kind: ui, subtype: page, app: customer-portal, route: /auth/check-email, status: implemented,
      calls: [EP-AUTH-10], theme: THEME-ROYA, i18n: true, rtl: true, states: [ready], history: [change-056] }
  - { id: PAGE-RESET-PASSWORD, kind: ui, subtype: page, app: customer-portal, route: /auth/reset-password, status: implemented,
      calls: [EP-AUTH-06], renders: [CMP-AUTH-FORM], theme: THEME-ROYA, i18n: true, rtl: true, states: [ready, error] }
  - { id: CMP-AUTH-FORM, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA, history: [change-024, change-029] }
