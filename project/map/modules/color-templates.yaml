module: color-templates
owner: DOM-REPORTING
status: implemented

doc:
  short: "Reusable color palettes for workspace branding."
  description: "A catalog of color templates that workspaces can select for their branding. Read by any authenticated user; created and edited by admins."
  rules:
    - "Only admins may create or edit color templates"

features:
  - { id: FEAT-COLTPL, name: Color Templates, visibility: both, uses: [EP-CTPL-01, EP-CTPL-03, SVC-COLTPL], doc: { short: "Browse and manage color templates.", description: "List color templates for selection; admins create, update, and toggle them active.", rules: ["Mutations restricted to role:admin"] } }

nodes:
  - { id: SVC-COLTPL, kind: logic, subtype: service, status: implemented,
      methods: [create, findAll, findById, update, delete, toggleActive],
      deps: [ENT-COLOR-TPL, ENT-WS-BRANDING] }

  # Entities → project/map/data/reporting-engine/ (ENT-COLOR-TPL; used by the services below via deps)

  - { id: EP-CTPL-01, kind: surface, subtype: rest.get, route: /api/v1/color-templates, auth: authenticated, status: implemented, calls: [SVC-COLTPL.findAll], returns: [DTO-CTPL-01-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-CTPL-01-RES } } }
  - { id: EP-CTPL-02, kind: surface, subtype: rest.get, route: /api/v1/color-templates/:id, auth: authenticated, status: implemented, calls: [SVC-COLTPL.findById], returns: [DTO-CTPL-02-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-CTPL-02-RES } } }
  - { id: EP-CTPL-03, kind: surface, subtype: rest.post, route: /api/v1/color-templates, auth: "role:admin", status: implemented, calls: [SVC-COLTPL.create], receives: [DTO-CTPL-03-REQ], returns: [DTO-CTPL-03-RES], spec: { request: { body: DTO-CTPL-03-REQ }, response: { status: 201, body: DTO-CTPL-03-RES } } }
  - { id: EP-CTPL-04, kind: surface, subtype: rest.patch, route: /api/v1/color-templates/:id, auth: "role:admin", status: implemented, calls: [SVC-COLTPL.update], receives: [DTO-CTPL-04-REQ], returns: [DTO-CTPL-04-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-CTPL-04-REQ }, response: { status: 200, body: DTO-CTPL-04-RES } } }
  - { id: EP-CTPL-05, kind: surface, subtype: rest.delete, route: /api/v1/color-templates/:id, auth: "role:admin", status: implemented, calls: [SVC-COLTPL.delete], returns: [DTO-CTPL-05-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-CTPL-05-RES } } }