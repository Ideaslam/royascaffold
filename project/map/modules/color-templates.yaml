module: color-templates
owner: DOM-REPORTING
status: implemented

features:
  - { id: FEAT-COLTPL, name: Color Templates, visibility: both, uses: [EP-CTPL-01, EP-CTPL-03, SVC-COLTPL] }

nodes:
  - { id: SVC-COLTPL, kind: logic, subtype: service, status: implemented,
      methods: [create, findAll, findById, update, delete, toggleActive],
      deps: [ENT-COLOR-TPL, ENT-WS-BRANDING] }

  - { id: ENT-COLOR-TPL, kind: data, subtype: collection, collection: colortemplates, workspace_scoped: false, status: implemented }

  - { id: EP-CTPL-01, kind: surface, subtype: rest.get, route: /api/v1/color-templates, auth: authenticated, status: implemented, calls: [SVC-COLTPL.findAll] }
  - { id: EP-CTPL-02, kind: surface, subtype: rest.get, route: /api/v1/color-templates/:id, auth: authenticated, status: implemented, calls: [SVC-COLTPL.findById] }
  - { id: EP-CTPL-03, kind: surface, subtype: rest.post, route: /api/v1/color-templates, auth: "role:admin", status: implemented, calls: [SVC-COLTPL.create] }
  - { id: EP-CTPL-04, kind: surface, subtype: rest.patch, route: /api/v1/color-templates/:id, auth: "role:admin", status: implemented, calls: [SVC-COLTPL.update] }
  - { id: EP-CTPL-05, kind: surface, subtype: rest.delete, route: /api/v1/color-templates/:id, auth: "role:admin", status: implemented, calls: [SVC-COLTPL.delete] }
