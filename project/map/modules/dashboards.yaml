module: dashboards
owner: DOM-REPORTING
status: implemented

# The reporting engine. Depends on the data engine's PUBLIC contracts only (IF-DATA-RESOLVER +
# SVC-OLAP-STORE) — never DatasetRepository/internals (BND-REPORTING-DATA, RULE-ARCH-001).
features:
  - { id: FEAT-DASH-GENERATE, name: AI Dashboard Generation, visibility: both, uses: [EP-DASH-01, SVC-DASH, SVC-PIPE-STEPS-DASH] }
  - { id: FEAT-DASH-VIEW, name: View + Widgets, visibility: both, uses: [PAGE-DASHBOARD-VIEW, EP-DASH-08, SVC-DASH] }
  - { id: FEAT-DASH-FILTERS, name: Dashboard Filters, visibility: both, uses: [EP-DASH-14, EP-DASH-15, SVC-DASH-FILTER] }
  - { id: FEAT-DASH-TEMPLATE, name: Dashboard From Template, visibility: both, uses: [EP-DASH-16, SVC-DASH] }

nodes:
  - { id: IF-REPORTING, kind: contract, subtype: interface, status: implemented,
      methods: [getChartData, getFilterOptions], rules: [RULE-ARCH-005], history: [change-062] }

  - { id: SVC-DASH, kind: logic, subtype: service, status: implemented,
      implements: [IF-REPORTING],
      methods: [createDashboard, listDashboards, getDashboard, getDashboardStatus, updateDashboard, deleteDashboard,
                duplicateDashboard, getChartData, refreshDashboard, addWidget, updateWidget, deleteWidget,
                retryGeneration, createDashboardFromTemplate, getFilterOptions, searchFilterValues],
      deps: [IF-DATA-RESOLVER, SVC-OLAP-STORE, SVC-DASH-FILTER, SVC-PIPE-ENGINE, SVC-TPL,
             ENT-DASHBOARD, ENT-CHARTWIDGET, ENT-CHARTCACHE, ENT-DASH-DATASOURCE, ENT-WIDGETDEF,
             SVC-BGJOBS, SVC-AUDIT, Q-DASH-GENERATION, Q-CACHE-RECALC],
      rules: [RULE-DASH-001, RULE-DASH-002, RULE-DASH-003, RULE-GLOBAL-006, RULE-GLOBAL-007, RULE-GLOBAL-010],
      history: [change-005, change-020, change-022, change-049, change-051] }

  - { id: SVC-DASH-FILTER, kind: logic, subtype: service, status: implemented,
      methods: [computeAndStore, getFilterOptions, searchFilterValues],
      deps: [ENT-FILTERVALUEMETA, SVC-OLAP-STORE], rules: [RULE-DASH-001], history: [change-021] }
  - { id: SVC-DASH-SEED, kind: logic, subtype: service, status: implemented,
      methods: [onModuleInit], deps: [ENT-WIDGETDEF], rules: [RULE-ARCH-006] }
  - { id: SVC-DASH-PIPELINE-REG, kind: logic, subtype: service, status: implemented,
      methods: [onModuleInit], deps: [SVC-PIPE-TYPE-REG], rules: [RULE-ARCH-006], history: [change-064] }

  - { id: ENT-DASHBOARD, kind: data, subtype: collection, collection: dashboards, workspace_scoped: true, status: implemented }
  - { id: ENT-CHARTWIDGET, kind: data, subtype: collection, collection: chartwidgets, workspace_scoped: true, status: implemented }
  - { id: ENT-CHARTCACHE, kind: data, subtype: collection, collection: chartdatacache, workspace_scoped: true, status: implemented }
  - { id: ENT-DASH-DATASOURCE, kind: data, subtype: collection, collection: dashboarddatasources, workspace_scoped: true, status: implemented }
  - { id: ENT-WIDGETDEF, kind: data, subtype: collection, collection: widgetdefinitions, workspace_scoped: false, status: implemented }
  - { id: ENT-FILTERVALUEMETA, kind: data, subtype: collection, collection: filtervaluemeta, workspace_scoped: true, status: implemented, history: [change-021] }

  # surfaces
  - { id: EP-DASH-01, kind: surface, subtype: rest.post, route: /api/v1/dashboards, auth: authenticated, status: implemented, calls: [SVC-DASH.createDashboard], rules: [RULE-GLOBAL-004, RULE-GLOBAL-007], history: [change-015] }
  - { id: EP-DASH-02, kind: surface, subtype: rest.get, route: /api/v1/dashboards, auth: authenticated, status: implemented, calls: [SVC-DASH.listDashboards], rules: [RULE-PAG-01] }
  - { id: EP-DASH-03, kind: surface, subtype: rest.get, route: /api/v1/dashboards/:id, auth: authenticated, status: implemented, calls: [SVC-DASH.getDashboard] }
  - { id: EP-DASH-04, kind: surface, subtype: rest.get, route: /api/v1/dashboards/:id/status, auth: authenticated, status: implemented, calls: [SVC-DASH.getDashboardStatus] }
  - { id: EP-DASH-05, kind: surface, subtype: rest.patch, route: /api/v1/dashboards/:id, auth: authenticated, status: implemented, calls: [SVC-DASH.updateDashboard] }
  - { id: EP-DASH-06, kind: surface, subtype: rest.delete, route: /api/v1/dashboards/:id, auth: authenticated, status: implemented, calls: [SVC-DASH.deleteDashboard] }
  - { id: EP-DASH-07, kind: surface, subtype: rest.post, route: /api/v1/dashboards/:id/duplicate, auth: authenticated, status: implemented, calls: [SVC-DASH.duplicateDashboard] }
  - { id: EP-DASH-08, kind: surface, subtype: rest.get, route: /api/v1/dashboards/:id/widgets/:widgetId/data, auth: "authenticated|share-token", status: implemented, calls: [SVC-DASH.getChartData], rules: [RULE-DASH-001, RULE-SHARE-002], history: [change-051] }
  - { id: EP-DASH-09, kind: surface, subtype: rest.post, route: /api/v1/dashboards/:id/refresh, auth: authenticated, status: implemented, calls: [SVC-DASH.refreshDashboard], rules: [RULE-DASH-002] }
  - { id: EP-DASH-10, kind: surface, subtype: rest.post, route: /api/v1/dashboards/:id/widgets, auth: authenticated, status: implemented, calls: [SVC-DASH.addWidget] }
  - { id: EP-DASH-11, kind: surface, subtype: rest.put, route: /api/v1/dashboards/:id/widgets/:widgetId, auth: authenticated, status: implemented, calls: [SVC-DASH.updateWidget], rules: [RULE-DASH-003] }
  - { id: EP-DASH-12, kind: surface, subtype: rest.delete, route: /api/v1/dashboards/:id/widgets/:widgetId, auth: authenticated, status: implemented, calls: [SVC-DASH.deleteWidget] }
  - { id: EP-DASH-13, kind: surface, subtype: rest.post, route: /api/v1/dashboards/:id/generate/retry, auth: authenticated, status: implemented, calls: [SVC-DASH.retryGeneration] }
  - { id: EP-DASH-14, kind: surface, subtype: rest.get, route: /api/v1/dashboards/:id/filter-options, auth: "authenticated|share-token", status: implemented, calls: [SVC-DASH.getFilterOptions], history: [change-021, change-051] }
  - { id: EP-DASH-15, kind: surface, subtype: rest.get, route: /api/v1/dashboards/datasets/:datasetId/filter-values/:column/search, auth: "authenticated|share-token", status: implemented, calls: [SVC-DASH.searchFilterValues], history: [change-021, change-051] }
  - { id: EP-DASH-16, kind: surface, subtype: rest.post, route: /api/v1/dashboards/from-template, auth: authenticated, status: implemented, calls: [SVC-DASH.createDashboardFromTemplate], rules: [RULE-GLOBAL-007, RULE-TPL-002], history: [change-049] }

  # frontend
  - { id: PAGE-DASHBOARDS, kind: ui, subtype: page, app: customer-portal, route: /app/dashboards, status: implemented,
      calls: [EP-DASH-02, EP-PROJ-02], renders: [CMP-DASH-CARD], theme: THEME-ROYA, i18n: true, rtl: true, states: [loading, empty, error, ready] }
  - { id: PAGE-DASHBOARD-VIEW, kind: ui, subtype: page, app: customer-portal, route: /app/dashboards/:id, status: implemented,
      calls: [EP-DASH-03, EP-DASH-08, EP-DASH-14, EP-DASH-15], renders: [CMP-WIDGET-GRID, CMP-CHART, CMP-DASH-FILTERS],
      theme: THEME-ROYA, i18n: true, rtl: true, states: [loading, empty, error, ready] }
  - { id: PAGE-DASHBOARD-WIZARD, kind: ui, subtype: page, app: customer-portal, route: /app/dashboards/new, status: implemented,
      calls: [EP-DASH-01, EP-DASH-16, EP-TPL-01, EP-TPL-04, EP-DATA-56], renders: [CMP-DATASET-PICKER],
      theme: THEME-ROYA, i18n: true, rtl: true, states: [loading, empty, error, ready], history: [change-068, change-069] }
  - { id: CMP-DASH-CARD, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA }
  - { id: CMP-WIDGET-GRID, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA }
  - { id: CMP-CHART, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA }
  - { id: CMP-DASH-FILTERS, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA, history: [change-021] }
  - { id: CMP-DATASET-PICKER, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA, history: [change-068, change-069] }
