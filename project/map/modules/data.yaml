module: data
owner: DOM-DATA
status: implemented

doc:
  short: "Ingestion and management of connections, data sources, and datasets."
  description: "The data engine's application module: legacy CSV upload, connections, data sources, datasets (tables/schema/sync), OAuth + webhook intake, and the data-source-type catalog. Exposes its public read contract IF-DATA-RESOLVER to the reporting engine."
  rules:
    - "Credentials are encrypted at rest and never returned in a response"
    - "Slow work (ingest, sync, analysis) runs on background queues"
    - "AI never receives raw data rows"

# ── Features (user-facing groupings; visibility = where they surface) ──────────────────────────
features:
  - { id: FEAT-DATA-CSV,     name: Legacy CSV Upload,        visibility: both,        uses: [EP-DATA-01, EP-DATA-04, SVC-DATA], doc: { short: "Upload and analyze CSV files.", description: "The legacy direct CSV upload path with asynchronous column analysis.", rules: ["Upload + analysis run on a background queue"] } }
  - { id: FEAT-DATA-CONN,    name: Manage Connections,       visibility: both,        uses: [EP-DATA-09, EP-DATA-10, SVC-DATA-CONN], doc: { short: "Create and manage source connections.", description: "CRUD, test, and re-auth of connections to external data providers.", rules: ["Connection credentials encrypted at rest"] } }
  - { id: FEAT-DATA-SOURCE,  name: Manage Data Sources,      visibility: both,        uses: [EP-DATA-51, EP-DATA-52, SVC-DATA-SOURCE, PAGE-DATA-SOURCES], doc: { short: "Manage data sources.", description: "Create, list, update, and delete data sources built on top of connections; implements the public IF-DATA-RESOLVER contract." } }
  - { id: FEAT-DATA-DATASET, name: Tables + Schema + Sync,   visibility: both,        uses: [EP-DATA-56, EP-DATA-44, SVC-DATA-DS], doc: { short: "Define tables, discover schema, and sync.", description: "Create datasets from source entities, discover/confirm schema, and run and track syncs into the analytics store.", rules: ["Schema discovery + sync run asynchronously"] } }
  - { id: FEAT-DATA-OAUTH,   name: OAuth + Webhooks,         visibility: backend-only, uses: [EP-DATA-25, EP-DATA-27, SVC-CONN-GOOGLE-OAUTH, SVC-CONN-SHOPIFY-OAUTH], doc: { short: "OAuth connect and provider webhooks.", description: "OAuth authorization flows and inbound webhooks for Google, Shopify, Salla, and Zid.", rules: ["Callbacks/webhooks are public but state/signature validated"] } }
  - { id: FEAT-DATA-DSTYPE,  name: Data Source Type Catalog, visibility: admin-panel,  uses: [EP-DATA-47, EP-DSTYPE-01, SVC-DSTYPE], doc: { short: "Catalog of supported data-source types.", description: "Admin-managed catalog describing each supported data-source type and its capabilities." } }

nodes:
  # ── Contract owned by the data engine (the reporting engine depends on THIS, not internals) ───
  - { id: IF-DATA-RESOLVER, kind: contract, subtype: interface, di_token: DATA_SOURCE_RESOLVER, status: implemented,
      methods: [resolveConnection, listBySemanticFlags, getDatasetReadiness],
      rules: [RULE-ARCH-001], history: [change-060],
      reason_note: "The data engine's public read contract — the reporting engine depends on THIS, never DatasetRepository" }

  # ── Services (logic) — methods listed by name only (light); detail lives in code via @map ─────
  - { id: SVC-DATA, kind: logic, subtype: service, status: implemented,
      methods: [uploadFile, initiateUpload, completeUpload, listFiles, getFile, updateColumns, deleteFile, retryAnalysis],
      deps: [ENT-CSVFILE, ENT-COLUMNMETA, ENT-CSVDATA, Q-CSV-ANALYSIS, SVC-EXT-STOR],
      rules: [RULE-DATA-001, RULE-GLOBAL-004, RULE-GLOBAL-009], history: [change-001, change-047] }

  - { id: SVC-DATA-CONN, kind: logic, subtype: service, status: implemented,
      methods: [create, list, get, update, reauth, delete, testConnection, decryptCredentials, setStatus, setError],
      deps: [ENT-CONNECTION, ENT-DATASOURCE, SVC-CONN-REG],
      rules: [RULE-DATA-004, RULE-CRED-PATH-01, RULE-GLOBAL-009], history: [change-015, change-059] }

  - { id: SVC-DATA-SOURCE, kind: logic, subtype: service, status: implemented,
      implements: [IF-DATA-RESOLVER],
      methods: [create, list, get, update, delete, resolveConnection, listBySemanticFlags, getDatasetReadiness],
      deps: [ENT-DATASOURCE, ENT-CONNECTION, ENT-DATASET],
      rules: [RULE-DATA-004], history: [change-059] }

  - { id: SVC-DATA-DS, kind: logic, subtype: service, status: implemented,
      methods: [create, list, listLite, listByDataSource, createFromEntities, listDataSourceEntities, get, update, delete,
                enqueueSchemaDiscovery, confirmMapping, proposeMappingForFlag, updateSchemaColumns, confirmSchemaSelection,
                refreshAvailableColumns, discoverSchemaWithAiProposal, listSyncHistory, listBySemanticFlags],
      deps: [ENT-DATASET, ENT-DATASOURCE, ENT-CONNECTION, SVC-DATA-CONN, SVC-DATA-SOURCE, SVC-CONN-REG, Q-DATA-SYNC, Q-SCHEMA-DISCOVERY],
      rules: [RULE-CRED-PATH-01, RULE-DATA-005, RULE-GLOBAL-002], history: [change-015, change-022, change-045, change-058, change-059] }

  - { id: SVC-DATA-SYNC, kind: logic, subtype: worker, status: implemented,
      methods: [process, updateProgress, triggerSync, retryRun, getRun],
      deps: [ENT-DATASET, ENT-DATASOURCE, ENT-CONNECTION, ENT-SYNCRUN, Q-DATA-SYNC, SVC-PIPE-ENGINE, SVC-OLAP-STORE],
      rules: [RULE-GLOBAL-004, RULE-GLOBAL-005, RULE-ARCH-004], history: [change-018, change-045] }

  - { id: SVC-DATA-SCHEMA-DISCOVERY, kind: logic, subtype: worker, status: implemented,
      methods: [process], deps: [SVC-DATA-DS, Q-SCHEMA-DISCOVERY],
      rules: [RULE-GLOBAL-004], history: [change-058] }

  - { id: SVC-DATA-SCHEMA-DRIFT, kind: logic, subtype: service, status: implemented,
      methods: [detect], history: [change-029] }

  - { id: SVC-DATA-SCHED, kind: logic, subtype: cron, status: implemented,
      methods: [runHourlySyncs, runDailySyncs], deps: [ENT-DATASET, SVC-DATA-SYNC], history: [change-023] }

  - { id: SVC-DSTYPE, kind: logic, subtype: service, status: implemented,
      methods: [findAll, findOne, update, toggleActive], deps: [ENT-DSTYPE-META], history: [change-048] }

  - { id: SVC-DATA-WHROUTE, kind: logic, subtype: service, status: implemented,
      methods: [upsert, findByStore], deps: [ENT-WEBHOOK-ROUTE], history: [change-043] }

  - { id: SVC-DATA-PIPELINE, kind: logic, subtype: service, status: implemented,
      methods: [resolveIngestSteps, getSetupFlow], deps: [SVC-CONN-REG, SVC-PIPE-TYPE-REG],
      rules: [RULE-ARCH-006], history: [change-064, change-065] }

  - { id: SVC-ADMIN-SYNC-HEALTH, kind: logic, subtype: service, status: implemented,
      methods: [getHealth], deps: [ENT-SYNCRUN], history: [change-029] }

  # Entities → project/map/data/data-source-engine/ (ENT-CSVFILE, ENT-COLUMNMETA, ENT-CSVDATA,
  #   ENT-CONNECTION, ENT-DATASOURCE, ENT-DATASET, ENT-SYNCRUN, ENT-DSTYPE-META, ENT-WEBHOOK-ROUTE;
  #   used by the services above via deps)

