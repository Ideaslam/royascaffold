module: engine-core
owner: DOM-ENGINE-CORE
status: implemented

# The neutral kernel (change-060 Phase 1, src/engine-core/). Pure registration/lookup mechanics —
# zero feature knowledge (RULE-ARCH-002). Persistence is supplied via the PIPELINE_RUN_STORE seam,
# so the engine has no edge to any repository (it stays persistence-agnostic).
doc:
  short: "The neutral kernel: pipeline engine, registries, and seams."
  description: "The stack-neutral core that runs pipelines and holds the step/type registries. It has zero feature knowledge and no persistence of its own; storage and tenant context are supplied through seams (PIPELINE_RUN_STORE, TenantContext)."
  rules:
    - "Zero feature knowledge — the kernel never imports application code"
    - "Persistence and tenant context enter only through seams"

nodes:
  - { id: SVC-PIPE-ENGINE, kind: logic, subtype: service, status: implemented,
      methods: [run], deps: [SVC-PIPE-TYPE-REG, SVC-PIPE-STEP-REG],
      rules: [RULE-ARCH-002, RULE-ARCH-006], history: [change-019, change-060, change-064] }
  - { id: SVC-PIPE-STEP-REG, kind: logic, subtype: registry, status: implemented,
      methods: [register, resolve], rules: [RULE-ARCH-006], history: [change-019] }
  - { id: SVC-PIPE-TYPE-REG, kind: logic, subtype: registry, status: implemented,
      methods: [register, resolve, has, list, setSteps], rules: [RULE-ARCH-002, RULE-ARCH-006],
      history: [change-019, change-020, change-045, change-064] }

  - { id: IF-PIPELINE-RUN-STORE, kind: contract, subtype: interface, di_token: PIPELINE_RUN_STORE,
      status: implemented, methods: [create, update, findById], history: [change-060] }
  - { id: IF-TENANT-CONTEXT, kind: contract, subtype: interface, status: implemented,
      reason_note: "TenantContext { workspaceSlug, workspaceId, userId, role, engineId }",
      rules: [RULE-ARCH-003], history: [change-060] }
