module: export
owner: DOM-REPORTING
status: partial
reason: "Excel + CSV export work; PDF export enqueues jobs but no worker consumes them yet"

doc:
  short: "Export dashboards to Excel, CSV, and (planned) PDF."
  description: "Excel and CSV export are implemented and synchronous. PDF export enqueues a job but no worker consumes it yet, so that path is partial."
  rules:
    - "Excel/CSV export is synchronous; PDF export is queued"

features:
  - { id: FEAT-EXPORT, name: Dashboard Export, visibility: both, uses: [EP-EXPORT-02, EP-EXPORT-03, SVC-EXPORT], doc: { short: "Download a dashboard as a file.", description: "Excel and CSV downloads work today; PDF export is queued but not yet processed by a worker.", rules: ["PDF export is partial pending a worker"] } }

nodes:
  - { id: SVC-EXPORT, kind: logic, subtype: service, status: implemented,
      methods: [requestPdfExport, getExcelExport, getCsvExport],
      deps: [ENT-DASHBOARD, ENT-CHARTWIDGET, SVC-BGJOBS, SVC-AUDIT, SVC-EXT-STOR, Q-PDF-EXPORT],
      rules: [RULE-EXPORT-001, RULE-EXPORT-002, RULE-GLOBAL-010] }

  - { id: EP-EXPORT-01, kind: surface, subtype: rest.post, route: /api/v1/dashboards/:id/export/pdf, auth: authenticated,
      status: partial, reason: "Job queued but no PDF worker implemented — export never completes",
      intentional_drift: true, calls: [SVC-EXPORT.requestPdfExport], rules: [RULE-EXPORT-001] }
  - { id: EP-EXPORT-02, kind: surface, subtype: rest.get, route: /api/v1/dashboards/:id/export/excel, auth: authenticated, status: implemented, calls: [SVC-EXPORT.getExcelExport], rules: [RULE-EXPORT-002] }
  - { id: EP-EXPORT-03, kind: surface, subtype: rest.get, route: /api/v1/dashboards/:id/export/csv, auth: authenticated, status: implemented, calls: [SVC-EXPORT.getCsvExport] }
