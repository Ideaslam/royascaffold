module: notifications
owner: DOM-PLATFORM
status: implemented

doc:
  short: "In-app notifications with unread tracking."
  description: "Creates and delivers in-app notifications, tracks read/unread state, and can also send email via the mail provider."
  rules:
    - "A user only sees their own notifications"

features:
  - { id: FEAT-NOTIF, name: In-app Notifications, visibility: customer-portal, uses: [EP-NOTIF-01, EP-NOTIF-02, SVC-NOTIF, PAGE-NOTIFICATIONS], doc: { short: "Receive and read notifications.", description: "List notifications, see the unread count, and mark items (or all) as read.", rules: ["Scoped to the signed-in user"] } }

nodes:
  - { id: SVC-NOTIF, kind: logic, subtype: service, status: implemented,
      methods: [notify, listNotifications, markAsRead, markAllAsRead, countUnread],
      deps: [ENT-NOTIFICATION, SVC-EXT-MAIL], rules: [RULE-NOTIF-001], history: [change-029] }

  # Entities → project/map/data/platform/ (ENT-NOTIFICATION; used by the services below via deps)

  - { id: EP-NOTIF-01, kind: surface, subtype: rest.get, route: /api/v1/notifications, auth: authenticated, status: implemented, calls: [SVC-NOTIF.listNotifications], rules: [RULE-PAG-01], returns: [DTO-NOTIF-01-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-NOTIF-01-RES } } }
  - { id: EP-NOTIF-02, kind: surface, subtype: rest.get, route: /api/v1/notifications/unread-count, auth: authenticated, status: implemented, calls: [SVC-NOTIF.countUnread], returns: [DTO-NOTIF-02-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-NOTIF-02-RES } } }
  - { id: EP-NOTIF-03, kind: surface, subtype: rest.patch, route: /api/v1/notifications/:id/read, auth: authenticated, status: implemented, calls: [SVC-NOTIF.markAsRead], receives: [DTO-NOTIF-03-REQ], returns: [DTO-NOTIF-03-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-NOTIF-03-REQ }, response: { status: 200, body: DTO-NOTIF-03-RES } } }
  - { id: EP-NOTIF-04, kind: surface, subtype: rest.patch, route: /api/v1/notifications/read-all, auth: authenticated, status: implemented, calls: [SVC-NOTIF.markAllAsRead], receives: [DTO-NOTIF-04-REQ], returns: [DTO-NOTIF-04-RES], spec: { request: { body: DTO-NOTIF-04-REQ }, response: { status: 200, body: DTO-NOTIF-04-RES } } }
  - { id: PAGE-NOTIFICATIONS, kind: ui, subtype: page, app: customer-portal, route: /app/notifications, status: implemented,
      calls: [EP-NOTIF-01, EP-NOTIF-02, EP-NOTIF-03, EP-NOTIF-04], theme: THEME-ROYA, i18n: true, rtl: true, states: [loading, empty, error, ready] }
