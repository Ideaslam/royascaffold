module: payments
owner: DOM-PLATFORM
status: implemented

# Admin manual ledger (SVC-PAY) + PayUp hosted-checkout orchestration (SVC-PAY-CHKOUT). Activation is
# never inline — only via the durable subscription-activation event (RULE-SUB-001).
doc:
  short: "Payment ledger and hosted-checkout orchestration."
  description: "An admin manual payment ledger plus PayUp hosted-checkout orchestration for subscriptions. Subscription activation is never inline — it flows through the durable subscription-activation event/queue."
  rules:
    - "Subscription activation happens only via the durable activation event, never inline"

features:
  - { id: FEAT-PAY-LEDGER, name: Payment Ledger (admin), visibility: admin-panel, uses: [EP-PAY-01, EP-PAY-03, SVC-PAY, PAGE-ADMIN-PAYMENTS], doc: { short: "Manually record and manage payments.", description: "Admins maintain a manual payment ledger (create/list/update/delete records).", rules: ["Admin-only"] } }
  - { id: FEAT-PAY-CHECKOUT, name: PayUp Checkout, visibility: both, uses: [EP-PAY-06, EP-PAY-07, SVC-PAY-CHKOUT], doc: { short: "Pay for a subscription via PayUp.", description: "Initiate a hosted checkout, then confirm or cancel it; on confirmation it enqueues subscription activation.", rules: ["Activation enqueued, not applied inline"] } }

nodes:
  - { id: SVC-PAY, kind: logic, subtype: service, status: implemented,
      methods: [list, getById, create, update, delete], deps: [ENT-PAYMENT, SVC-AUDIT],
      rules: [RULE-GLOBAL-010], history: [change-002] }
  - { id: SVC-PAY-CHKOUT, kind: logic, subtype: service, status: implemented,
      methods: [initiateSubscriptionCheckout, confirm, cancel],
      deps: [ENT-PAYMENT, SVC-AUDIT, SVC-EXT-PAY, SVC-USR, Q-SUB-ACTIVATION],
      rules: [RULE-SUB-001, RULE-GLOBAL-010], history: [change-003] }

  # Entities → project/map/data/platform/ (ENT-PAYMENT; used by the services below via deps)

  - { id: EP-PAY-01, kind: surface, subtype: rest.get, route: /api/v1/payments, auth: "role:admin", status: implemented, calls: [SVC-PAY.list], rules: [RULE-PAG-01] }
  - { id: EP-PAY-02, kind: surface, subtype: rest.get, route: /api/v1/payments/:id, auth: "role:admin", status: implemented, calls: [SVC-PAY.getById] }
  - { id: EP-PAY-03, kind: surface, subtype: rest.post, route: /api/v1/payments, auth: "role:admin", status: implemented, calls: [SVC-PAY.create] }
  - { id: EP-PAY-04, kind: surface, subtype: rest.patch, route: /api/v1/payments/:id, auth: "role:admin", status: implemented, calls: [SVC-PAY.update] }
  - { id: EP-PAY-05, kind: surface, subtype: rest.delete, route: /api/v1/payments/:id, auth: "role:admin", status: implemented, calls: [SVC-PAY.delete] }
  - { id: EP-PAY-06, kind: surface, subtype: rest.get, route: /api/v1/payments/payup/confirm, auth: public, status: implemented, calls: [SVC-PAY-CHKOUT.confirm], rules: [RULE-SUB-001], history: [change-003] }
  - { id: EP-PAY-07, kind: surface, subtype: rest.get, route: /api/v1/payments/payup/cancel, auth: public, status: implemented, calls: [SVC-PAY-CHKOUT.cancel], history: [change-003] }

  - { id: PAGE-ADMIN-PAYMENTS, kind: ui, subtype: page, app: admin-panel, route: /admin/payments, status: implemented,
      calls: [EP-PAY-01, EP-PAY-03], theme: THEME-ROYA, states: [loading, empty, error, ready], history: [change-010] }
