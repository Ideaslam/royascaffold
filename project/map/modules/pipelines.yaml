module: pipelines
owner: DOM-DATA
status: implemented

# Transitional: concrete step packs + the run repo live in src/modules/pipelines/ until they move
# with their owning engine (ingest -> data engine, dashboard -> reporting). They self-register into
# the kernel's StepRegistry (a public engine-core contract), never editing the kernel.
doc:
  short: "Concrete pipeline step packs (ingest + dashboard)."
  description: "The concrete step implementations that run on the kernel's PipelineEngine, plus the run repository. Step packs self-register into the kernel's StepRegistry; they never edit the kernel."
  rules:
    - "Step packs self-register into the kernel StepRegistry"
    - "Steps depend on engine-core seams, never the kernel internals"

features:
  - { id: FEAT-PIPE-INGEST, name: Ingest Pipeline, visibility: backend-only, uses: [SVC-PIPE-STEPS-INGEST], doc: { short: "The data-ingestion step pack.", description: "Extract, identify columns, apply mapping, clean, type-cast, dedupe, and load rows into the analytics store." } }
  - { id: FEAT-PIPE-DASH, name: Dashboard Pipeline, visibility: backend-only, uses: [SVC-PIPE-STEPS-DASH], doc: { short: "The dashboard-generation step pack.", description: "Gather dataset schemas, load the widget catalog, generate widgets with AI, build filters, and persist widgets." } }

nodes:
  - { id: SVC-PIPE-RUN-REPO, kind: logic, subtype: repository, status: implemented,
      implements: [IF-PIPELINE-RUN-STORE], methods: [create, update, findById, findByWorkspaceAndDataset],
      deps: [ENT-PIPELINE-RUN], history: [change-019] }

  - { id: SVC-PIPE-STEPS-INGEST, kind: logic, subtype: service, status: implemented,
      methods: [extract, identifyColumns, applyMapping, trim, typeCast, dedupe, load],
      deps: [SVC-PIPE-STEP-REG, SVC-CONN-REG, SVC-OLAP-STORE, SVC-EXT-AI],
      rules: [RULE-ARCH-006, RULE-GLOBAL-002, RULE-DATA-005], history: [change-019, change-038, change-045, change-055] }

  - { id: SVC-PIPE-STEPS-DASH, kind: logic, subtype: service, status: implemented,
      methods: [gatherDatasetSchemas, loadWidgetCatalog, generateWidgetsAi, buildFilters, saveWidgets, invalidateWidgetCache],
      deps: [SVC-PIPE-STEP-REG, SVC-OLAP-STORE, SVC-EXT-AI],
      rules: [RULE-GLOBAL-002], history: [change-020, change-021] }

  - { id: SVC-PIPE-STEPS-TPL, kind: logic, subtype: service, status: partial,
      reason: "Template instantiation pipeline documented (change-049); not yet in code",
      intentional_drift: true,
      methods: [ensureCanonicalViews, instantiateTemplateWidgets, adaptTemplateWidgetsAi],
      deps: [SVC-PIPE-STEP-REG, SVC-OLAP-STORE, SVC-EXT-AI],
      rules: [RULE-TPL-002, RULE-TPL-003, RULE-GLOBAL-002], history: [change-049] }

  # Entities → project/map/data/data-source-engine/ (ENT-PIPELINE-RUN; used by the services below via deps)
