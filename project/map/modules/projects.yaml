module: projects
owner: DOM-REPORTING
status: implemented

# Projects are dashboard containers, workspace-scoped via the dynamic collection ws_{slug}_projects.
doc:
  short: "Dashboard containers, one per workspace."
  description: "Projects group dashboards. They are workspace-scoped via the dynamic collection ws_{slug}_projects and provide standard CRUD."
  rules:
    - "Workspace-scoped; a project belongs to exactly one workspace"

features:
  - { id: FEAT-PROJ, name: Projects, visibility: both, uses: [EP-PROJ-01, EP-PROJ-02, SVC-PROJ, PAGE-PROJECTS], doc: { short: "Create and manage projects.", description: "CRUD for projects that contain dashboards, listed and edited from the customer portal.", rules: ["Scoped to the active workspace"] } }

nodes:
  - { id: SVC-PROJ, kind: logic, subtype: service, status: implemented,
      methods: [create, list, getById, update, delete], deps: [ENT-PROJECT, SVC-AUDIT],
      rules: [RULE-WS-SCOPE-01, RULE-GLOBAL-010], history: [change-013] }

  # Entities → project/map/data/reporting-engine/ (ENT-PROJECT; used by the services below via deps)

  - { id: EP-PROJ-01, kind: surface, subtype: rest.post, route: /api/v1/projects, auth: authenticated, status: implemented, calls: [SVC-PROJ.create], receives: [DTO-PROJ-01-REQ], returns: [DTO-PROJ-01-RES], spec: { request: { body: DTO-PROJ-01-REQ }, response: { status: 201, body: DTO-PROJ-01-RES } } }
  - { id: EP-PROJ-02, kind: surface, subtype: rest.get, route: /api/v1/projects, auth: authenticated, status: implemented, calls: [SVC-PROJ.list], rules: [RULE-PAG-01], returns: [DTO-PROJ-02-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-PROJ-02-RES } } }
  - { id: EP-PROJ-03, kind: surface, subtype: rest.get, route: /api/v1/projects/:id, auth: authenticated, status: implemented, calls: [SVC-PROJ.getById], returns: [DTO-PROJ-03-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-PROJ-03-RES } } }
  - { id: EP-PROJ-04, kind: surface, subtype: rest.put, route: /api/v1/projects/:id, auth: authenticated, status: implemented, calls: [SVC-PROJ.update], receives: [DTO-PROJ-04-REQ], returns: [DTO-PROJ-04-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-PROJ-04-REQ }, response: { status: 200, body: DTO-PROJ-04-RES } } }
  - { id: EP-PROJ-05, kind: surface, subtype: rest.delete, route: /api/v1/projects/:id, auth: authenticated, status: implemented, calls: [SVC-PROJ.delete], returns: [DTO-PROJ-05-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-PROJ-05-RES } } }
  - { id: PAGE-PROJECTS, kind: ui, subtype: page, app: customer-portal, route: /app/projects, status: implemented,
      calls: [EP-PROJ-02, EP-PROJ-01], renders: [CMP-PROJECT-CARD], theme: THEME-ROYA, i18n: true, rtl: true,
      states: [loading, empty, error, ready], history: [change-034] }
  - { id: CMP-PROJECT-CARD, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA }
