module: settings
owner: DOM-PLATFORM
status: implemented

doc:
  short: "Global system settings singleton."
  description: "A single global settings document that admins read and update to configure system-wide behavior."
  rules:
    - "Exactly one global settings document exists"
    - "Only admins may read or update settings"

features:
  - { id: FEAT-SETTINGS, name: System Settings, visibility: admin-panel, uses: [EP-SET-01, EP-SET-02, SVC-SET, PAGE-ADMIN-SETTINGS], doc: { short: "View and edit system settings.", description: "Admins read and update the global settings singleton from the admin panel.", rules: ["Admin-only"] } }

nodes:
  - { id: SVC-SET, kind: logic, subtype: service, status: implemented,
      methods: [getSettings, updateSettings], deps: [ENT-SETTINGS, SVC-AUDIT], rules: [RULE-GLOBAL-010] }

  - { id: ENT-SETTINGS, kind: data, subtype: collection, collection: systemsettings, workspace_scoped: false, status: implemented,
      reason_note: "single global singleton document" }

  - { id: EP-SET-01, kind: surface, subtype: rest.get, route: /api/v1/settings, auth: "role:admin", status: implemented, calls: [SVC-SET.getSettings] }
  - { id: EP-SET-02, kind: surface, subtype: rest.patch, route: /api/v1/settings, auth: "role:admin", status: implemented, calls: [SVC-SET.updateSettings] }

  - { id: PAGE-ADMIN-SETTINGS, kind: ui, subtype: page, app: admin-panel, route: /admin/settings, status: implemented,
      calls: [EP-SET-01, EP-SET-02], theme: THEME-ROYA, states: [loading, error, ready] }
