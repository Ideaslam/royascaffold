module: sharing
owner: DOM-REPORTING
status: implemented

features:
  - { id: FEAT-SHARE, name: Public Share Links, visibility: both, uses: [EP-SHARE-01, EP-SHARE-04, SVC-SHARE, PAGE-SHARED] }

nodes:
  - { id: SVC-SHARE, kind: logic, subtype: service, status: implemented,
      methods: [createShareLink, listShareLinks, revokeShareLink, resolveSharedDashboard],
      deps: [ENT-SHARELINK, ENT-DASHBOARD, ENT-CHARTWIDGET, ENT-CHARTCACHE, SVC-AUDIT],
      rules: [RULE-SHARE-001, RULE-SHARE-002, RULE-GLOBAL-010] }

  - { id: ENT-SHARELINK, kind: data, subtype: collection, collection: sharelinks, workspace_scoped: true, status: implemented }

  - { id: EP-SHARE-01, kind: surface, subtype: rest.post, route: /api/v1/dashboards/:id/share, auth: authenticated, status: implemented, calls: [SVC-SHARE.createShareLink], rules: [RULE-SHARE-001] }
  - { id: EP-SHARE-02, kind: surface, subtype: rest.get, route: /api/v1/dashboards/:id/share, auth: authenticated, status: implemented, calls: [SVC-SHARE.listShareLinks] }
  - { id: EP-SHARE-03, kind: surface, subtype: rest.delete, route: /api/v1/dashboards/:id/share/:shareLinkId, auth: authenticated, status: implemented, calls: [SVC-SHARE.revokeShareLink] }
  - { id: EP-SHARE-04, kind: surface, subtype: rest.get, route: /api/v1/shared/:token, auth: public, status: implemented, calls: [SVC-SHARE.resolveSharedDashboard], rules: [RULE-SHARE-002] }

  - { id: PAGE-SHARED, kind: ui, subtype: page, app: customer-portal, route: /shared/:token, status: implemented,
      calls: [EP-SHARE-04, EP-DASH-08, EP-DASH-14], renders: [CMP-WIDGET-GRID], theme: THEME-ROYA, i18n: true, rtl: true,
      states: [loading, empty, error, ready, expired, revoked], history: [change-023, change-051] }
