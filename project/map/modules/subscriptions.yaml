module: subscriptions
owner: DOM-PLATFORM
status: implemented

# Plan catalog + per-workspace subscription lifecycle + extensible quota enforcement (limit registry).
doc:
  short: "Plan catalog, subscription lifecycle, and quota enforcement."
  description: "Owns the plan catalog, each workspace's subscription lifecycle (subscribe, upgrade/downgrade, cancel, activate), and an extensible quota/limit registry that other modules check before consuming resources."
  rules:
    - "Activation is driven by the durable subscription-activation event"
    - "Quotas are enforced through the limit registry"

features:
  - { id: FEAT-SUB-SELF, name: Self-service Subscribe, visibility: customer-portal, uses: [EP-SUB-14, EP-SUB-18, SVC-SUB, PAGE-SUBSCRIPTIONS], doc: { short: "Subscribe and manage your plan.", description: "Customers view plans, subscribe, upgrade/downgrade, cancel, and pay pending invoices." } }
  - { id: FEAT-SUB-ADMIN, name: Plans + Assignment (admin), visibility: admin-panel, uses: [EP-SUB-03, EP-SUB-11, SVC-SUB, PAGE-ADMIN-SUBSCRIPTIONS], doc: { short: "Manage plans and assignments.", description: "Admins create/edit plans and assign or change subscriptions for any workspace.", rules: ["Admin-only"] } }
  - { id: FEAT-SUB-LIMITS, name: Quota Enforcement, visibility: backend-only, uses: [SVC-SUB-LIM], doc: { short: "Enforce plan quotas.", description: "An extensible limit registry that checks a workspace's plan quota before a resource is consumed." } }

nodes:
  - { id: SVC-SUB, kind: logic, subtype: service, status: implemented,
      methods: [listPlans, assignDefaultFreePlan, listAllPlans, createPlan, updatePlan, deletePlan, getMySubscription,
                selfSubscribe, selfCancel, selfUpgrade, selfDowngrade, listAllSubscriptions, getSubscriptionById,
                createSubscription, updateSubscription, assignSubscription, changeSubscription, cancelSubscription,
                activateFromPayment, activateSubscription, deactivateSubscription, listPendingPayments, payPendingInvoice],
      deps: [ENT-SUBSCRIPTION, ENT-PLAN, ENT-USER, SVC-AUDIT, SVC-PAY-CHKOUT, SVC-SUB-LIM, Q-SUB-ACTIVATION],
      rules: [RULE-SUB-001, RULE-SUB-002, RULE-GLOBAL-010], history: [change-001, change-003, change-004, change-005, change-056] }

  - { id: SVC-SUB-LIM, kind: logic, subtype: registry, status: implemented,
      methods: [check, assertAllowed, incrementUsage, buildUsageEnvelope, assertResourceUnlocked,
                incrementSyncedRows, incrementSyncsToday, checkSyncAllowed],
      deps: [ENT-SUBSCRIPTION, ENT-DASHBOARD], rules: [RULE-GLOBAL-007, RULE-SUB-002, RULE-ARCH-006], history: [change-004, change-029] }

  - { id: SVC-SUB-ROLL, kind: logic, subtype: worker, status: implemented,
      methods: [process], deps: [ENT-SUBSCRIPTION, Q-SUB-ROLLOVER], rules: [RULE-GLOBAL-004], history: [change-004] }

  # Entities → project/map/data/platform/ (ENT-SUBSCRIPTION, ENT-PLAN; used by the services below via deps)

  # surfaces
  - { id: EP-SUB-01, kind: surface, subtype: rest.get, route: /api/v1/subscriptions/plans, auth: authenticated, status: implemented, calls: [SVC-SUB.listPlans], returns: [DTO-SUB-01-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-SUB-01-RES } } }
  - { id: EP-SUB-02, kind: surface, subtype: rest.get, route: /api/v1/subscriptions/plans/all, auth: "role:admin", status: implemented, calls: [SVC-SUB.listAllPlans], returns: [DTO-SUB-02-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-SUB-02-RES } } }
  - { id: EP-SUB-03, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/plans, auth: "role:admin", status: implemented, calls: [SVC-SUB.createPlan], receives: [DTO-SUB-03-REQ], returns: [DTO-SUB-03-RES], spec: { request: { body: DTO-SUB-03-REQ }, response: { status: 201, body: DTO-SUB-03-RES } } }
  - { id: EP-SUB-04, kind: surface, subtype: rest.put, route: /api/v1/subscriptions/plans/:id, auth: "role:admin", status: implemented, calls: [SVC-SUB.updatePlan], receives: [DTO-SUB-04-REQ], returns: [DTO-SUB-04-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-SUB-04-REQ }, response: { status: 200, body: DTO-SUB-04-RES } } }
  - { id: EP-SUB-05, kind: surface, subtype: rest.delete, route: /api/v1/subscriptions/plans/:id, auth: "role:admin", status: implemented, calls: [SVC-SUB.deletePlan], returns: [DTO-SUB-05-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-SUB-05-RES } } }
  - { id: EP-SUB-06, kind: surface, subtype: rest.get, route: /api/v1/subscriptions/me, auth: authenticated, status: implemented, calls: [SVC-SUB.getMySubscription], history: [change-004], returns: [DTO-SUB-06-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-SUB-06-RES } } }
  - { id: EP-SUB-07, kind: surface, subtype: rest.get, route: /api/v1/subscriptions, auth: "role:admin", status: implemented, calls: [SVC-SUB.listAllSubscriptions], rules: [RULE-PAG-01], returns: [DTO-SUB-07-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-SUB-07-RES } } }
  - { id: EP-SUB-08, kind: surface, subtype: rest.get, route: /api/v1/subscriptions/:id, auth: "role:admin", status: implemented, calls: [SVC-SUB.getSubscriptionById], returns: [DTO-SUB-08-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-SUB-08-RES } } }
  - { id: EP-SUB-09, kind: surface, subtype: rest.post, route: /api/v1/subscriptions, auth: "role:admin", status: implemented, calls: [SVC-SUB.createSubscription], receives: [DTO-SUB-09-REQ], returns: [DTO-SUB-09-RES], spec: { request: { body: DTO-SUB-09-REQ }, response: { status: 201, body: DTO-SUB-09-RES } } }
  - { id: EP-SUB-10, kind: surface, subtype: rest.put, route: /api/v1/subscriptions/:id, auth: "role:admin", status: implemented, calls: [SVC-SUB.updateSubscription], receives: [DTO-SUB-10-REQ], returns: [DTO-SUB-10-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-SUB-10-REQ }, response: { status: 200, body: DTO-SUB-10-RES } } }
  - { id: EP-SUB-11, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/assign, auth: "role:admin", status: implemented, calls: [SVC-SUB.assignSubscription], history: [change-005], receives: [DTO-SUB-11-REQ], returns: [DTO-SUB-11-RES], spec: { request: { body: DTO-SUB-11-REQ }, response: { status: 201, body: DTO-SUB-11-RES } } }
  - { id: EP-SUB-12, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/change, auth: "role:admin", status: implemented, calls: [SVC-SUB.changeSubscription], history: [change-005], receives: [DTO-SUB-12-REQ], returns: [DTO-SUB-12-RES], spec: { request: { body: DTO-SUB-12-REQ }, response: { status: 201, body: DTO-SUB-12-RES } } }
  - { id: EP-SUB-13, kind: surface, subtype: rest.patch, route: /api/v1/subscriptions/:userId/cancel, auth: "role:admin", status: implemented, calls: [SVC-SUB.cancelSubscription], receives: [DTO-SUB-13-REQ], returns: [DTO-SUB-13-RES], spec: { request: { params: [{ name: userId, in: path, type: ObjectId, required: true }], body: DTO-SUB-13-REQ }, response: { status: 200, body: DTO-SUB-13-RES } } }
  - { id: EP-SUB-14, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/subscribe, auth: authenticated, status: implemented, calls: [SVC-SUB.selfSubscribe], rules: [RULE-SUB-001, RULE-SUB-002], history: [change-003, change-004, change-005], receives: [DTO-SUB-14-REQ], returns: [DTO-SUB-14-RES], spec: { request: { body: DTO-SUB-14-REQ }, response: { status: 201, body: DTO-SUB-14-RES } } }
  - { id: EP-SUB-15, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/cancel, auth: authenticated, status: implemented, calls: [SVC-SUB.selfCancel], receives: [DTO-SUB-15-REQ], returns: [DTO-SUB-15-RES], spec: { request: { body: DTO-SUB-15-REQ }, response: { status: 201, body: DTO-SUB-15-RES } } }
  - { id: EP-SUB-16, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/:id/activate, auth: "role:admin", status: implemented, calls: [SVC-SUB.activateSubscription], history: [change-004], receives: [DTO-SUB-16-REQ], returns: [DTO-SUB-16-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-SUB-16-REQ }, response: { status: 201, body: DTO-SUB-16-RES } } }
  - { id: EP-SUB-17, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/:id/deactivate, auth: "role:admin", status: implemented, calls: [SVC-SUB.deactivateSubscription], history: [change-005], receives: [DTO-SUB-17-REQ], returns: [DTO-SUB-17-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-SUB-17-REQ }, response: { status: 201, body: DTO-SUB-17-RES } } }
  - { id: EP-SUB-18, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/upgrade, auth: authenticated, status: implemented, calls: [SVC-SUB.selfUpgrade], rules: [RULE-SUB-002], history: [change-005], receives: [DTO-SUB-18-REQ], returns: [DTO-SUB-18-RES], spec: { request: { body: DTO-SUB-18-REQ }, response: { status: 201, body: DTO-SUB-18-RES } } }
  - { id: EP-SUB-19, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/downgrade, auth: authenticated, status: implemented, calls: [SVC-SUB.selfDowngrade], rules: [RULE-SUB-002], history: [change-005], receives: [DTO-SUB-19-REQ], returns: [DTO-SUB-19-RES], spec: { request: { body: DTO-SUB-19-REQ }, response: { status: 201, body: DTO-SUB-19-RES } } }
  - { id: EP-SUB-20, kind: surface, subtype: rest.get, route: /api/v1/subscriptions/me/pending-payments, auth: authenticated, status: implemented, calls: [SVC-SUB.listPendingPayments], history: [change-005], returns: [DTO-SUB-20-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-SUB-20-RES } } }
  - { id: EP-SUB-21, kind: surface, subtype: rest.post, route: /api/v1/subscriptions/payments/:paymentId/pay, auth: authenticated, status: implemented, calls: [SVC-SUB.payPendingInvoice], history: [change-005], receives: [DTO-SUB-21-REQ], returns: [DTO-SUB-21-RES], spec: { request: { params: [{ name: paymentId, in: path, type: ObjectId, required: true }], body: DTO-SUB-21-REQ }, response: { status: 201, body: DTO-SUB-21-RES } } }
  # frontend
  - { id: PAGE-SUBSCRIPTIONS, kind: ui, subtype: page, app: customer-portal, route: /app/subscriptions, status: implemented,
      calls: [EP-SUB-01, EP-SUB-06, EP-SUB-14, EP-SUB-18, EP-SUB-19, EP-SUB-20, EP-SUB-21], renders: [CMP-PLAN-CARD],
      theme: THEME-ROYA, i18n: true, rtl: true, states: [loading, error, ready], history: [change-013] }
  - { id: PAGE-ADMIN-SUBSCRIPTIONS, kind: ui, subtype: page, app: admin-panel, route: /admin/subscriptions, status: implemented,
      calls: [EP-SUB-02, EP-SUB-03, EP-SUB-07, EP-SUB-11], theme: THEME-ROYA, states: [loading, empty, error, ready], history: [change-002, change-010] }
  - { id: CMP-PLAN-CARD, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA, history: [change-013] }
