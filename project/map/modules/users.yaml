module: users
owner: DOM-PLATFORM
status: implemented

# Users are global (system role admin|editor|viewer). Workspace membership is separate (workspace module).
doc:
  short: "Global user accounts and admin user management."
  description: "Owns the users collection and the global system role (admin|editor|viewer). Covers self-service profile/password plus admin CRUD, suspend/reactivate. Workspace membership is a separate concern (workspace module)."
  rules:
    - "A user's system role is global, independent of workspace membership"
    - "Admin user-management endpoints require role:admin"

features:
  - { id: FEAT-USER-SELF, name: Self-service Profile, visibility: customer-portal, uses: [EP-USR-01, EP-USR-02, SVC-USR, PAGE-PROFILE], doc: { short: "Users manage their own profile and password.", description: "Self-service profile update and password change for the signed-in user.", rules: ["A user may only edit their own profile"] } }
  - { id: FEAT-USER-ADMIN, name: Admin User Management, visibility: admin-panel, uses: [EP-USR-03, EP-USR-05, SVC-USR, PAGE-ADMIN-USERS], doc: { short: "Admins manage all user accounts.", description: "Admin listing, creation, update, and suspension/reactivation of users from the admin panel.", rules: ["Restricted to role:admin"] } }

nodes:
  # Entities → project/map/data/platform/ (ENT-USER; used by the services below via deps)

  - { id: SVC-USR, kind: logic, subtype: service, status: implemented,
      methods: [updateProfile, changePassword, listUsers, getUserById, createUser, updateUser, deleteUser,
                suspendUser, reactivateUser, autoSuspendForUnpaidInvoices],
      deps: [ENT-USER, SVC-AUDIT],
      rules: [RULE-AUTH-001, RULE-GLOBAL-008, RULE-GLOBAL-009, RULE-GLOBAL-010], history: [change-001, change-004] }

  # surfaces
  - { id: EP-USR-01, kind: surface, subtype: rest.patch, route: /api/v1/users/me, auth: authenticated, status: implemented, calls: [SVC-USR.updateProfile] }
  - { id: EP-USR-02, kind: surface, subtype: rest.patch, route: /api/v1/users/me/password, auth: authenticated, status: implemented, calls: [SVC-USR.changePassword] }
  - { id: EP-USR-03, kind: surface, subtype: rest.get, route: /api/v1/users, auth: "role:admin", status: implemented, calls: [SVC-USR.listUsers], rules: [RULE-PAG-01] }
  - { id: EP-USR-04, kind: surface, subtype: rest.get, route: /api/v1/users/:id, auth: "role:admin", status: implemented, calls: [SVC-USR.getUserById] }
  - { id: EP-USR-05, kind: surface, subtype: rest.post, route: /api/v1/users, auth: "role:admin", status: implemented, calls: [SVC-USR.createUser] }
  - { id: EP-USR-06, kind: surface, subtype: rest.put, route: /api/v1/users/:id, auth: "role:admin", status: implemented, calls: [SVC-USR.updateUser] }
  - { id: EP-USR-07, kind: surface, subtype: rest.delete, route: /api/v1/users/:id, auth: "role:admin", status: implemented, calls: [SVC-USR.deleteUser], rules: [RULE-GLOBAL-008] }
  - { id: EP-USR-08, kind: surface, subtype: rest.patch, route: /api/v1/users/:id/suspend, auth: "role:admin", status: implemented, calls: [SVC-USR.suspendUser], history: [change-004] }
  - { id: EP-USR-09, kind: surface, subtype: rest.patch, route: /api/v1/users/:id/reactivate, auth: "role:admin", status: implemented, calls: [SVC-USR.reactivateUser], history: [change-004] }

  # frontend
  - { id: PAGE-PROFILE, kind: ui, subtype: page, app: customer-portal, route: /app/profile, status: implemented,
      calls: [EP-AUTH-08, EP-USR-01, EP-USR-02], theme: THEME-ROYA, i18n: true, rtl: true, states: [loading, error, ready] }
  - { id: PAGE-ADMIN-USERS, kind: ui, subtype: page, app: admin-panel, route: /admin/users, status: implemented,
      calls: [EP-USR-03, EP-USR-05, EP-USR-08], renders: [CMP-USER-TABLE], theme: THEME-ROYA, states: [loading, empty, error, ready] }
  - { id: CMP-USER-TABLE, kind: ui, subtype: component, app: admin-panel, status: implemented, theme: THEME-ROYA }
