module: workspace
owner: DOM-PLATFORM
status: implemented

# Multi-tenancy root. Each workspace owns dynamic ws_{slug}_* collections. Membership drives the
# workspace-role auth layer (SVC-GUARD-WSROLE).
doc:
  short: "Multi-tenancy root: workspaces, members, invites, branding, onboarding."
  description: "The tenancy root. Each workspace owns dynamic ws_{slug}_* collections and its membership drives the workspace-role auth layer. Covers workspace CRUD, member management, invitations, branding, and onboarding progress."
  rules:
    - "Every tenant-scoped resource belongs to a workspace"
    - "Member/owner actions are gated by the workspace-role guard"
    - "Workspace slugs are unique"

features:
  - { id: FEAT-WS-MGMT, name: Workspace Management, visibility: both, uses: [EP-WS-01, EP-WS-07, SVC-WS, PAGE-WORKSPACE-SETTINGS], doc: { short: "Create and manage workspaces.", description: "Workspace creation, settings, slug-availability checks, switching the active workspace, and deletion.", rules: ["Only owners may update or delete a workspace"] } }
  - { id: FEAT-WS-INVITE, name: Invitations, visibility: both, uses: [EP-WS-11, EP-WS-15, SVC-WS-INVITE], doc: { short: "Invite and admit members.", description: "Send, resend, revoke, and accept workspace invitations, subject to the plan's seat limits.", rules: ["Invites respect the subscription seat quota"] } }
  - { id: FEAT-WS-BRAND, name: Branding, visibility: customer-portal, uses: [EP-WS-16, EP-WS-17, SVC-WS-BRAND], doc: { short: "Customize workspace branding.", description: "Upload a logo and pick a color template applied across the workspace UI.", rules: ["Logos stored via the storage provider, never inline"] } }
  - { id: FEAT-WS-ONBOARD, name: Onboarding, visibility: customer-portal, uses: [EP-WS-20, EP-WS-21, SVC-WS-ONBOARD], history: [change-006], doc: { short: "Track onboarding progress.", description: "Persists and reports each workspace's onboarding checklist progress." } }

nodes:
  - { id: SVC-WS, kind: logic, subtype: service, status: implemented,
      methods: [createWorkspace, getWorkspace, updateWorkspace, checkSlugAvailability, switchWorkspace, deleteWorkspace,
                listUserWorkspaces, adminListWorkspaces, adminUpdateStatus],
      deps: [ENT-WORKSPACE, ENT-WS-MEMBERSHIP, ENT-WS-BRANDING, ENT-ONBOARDING, ENT-WS-INVITATION, ENT-USER, SVC-AUDIT, SVC-SUB],
      rules: [RULE-WS-SCOPE-01, RULE-GLOBAL-010], history: [change-008, change-056] }
  - { id: SVC-WS-MEMBER, kind: logic, subtype: service, status: implemented,
      methods: [listMembers, removeMember, changeRole], deps: [ENT-WS-MEMBERSHIP, SVC-AUDIT], history: [change-008] }
  - { id: SVC-WS-INVITE, kind: logic, subtype: service, status: implemented,
      methods: [invite, resendInvite, revokeInvite, acceptInvitation, listInvitations],
      deps: [ENT-WS-INVITATION, ENT-WS-MEMBERSHIP, SVC-EXT-MAIL, SVC-PAY-CHKOUT],
      rules: [RULE-NOTIF-001, RULE-SUB-001], history: [change-007, change-008, change-009] }
  - { id: SVC-WS-BRAND, kind: logic, subtype: service, status: implemented,
      methods: [uploadLogo, selectColorTemplate, getBranding, deleteLogo],
      deps: [ENT-WS-BRANDING, SVC-EXT-STOR, ENT-COLOR-TPL], rules: [RULE-GLOBAL-009] }
  - { id: SVC-WS-ONBOARD, kind: logic, subtype: service, status: implemented,
      methods: [getProgress, updateProgress], deps: [ENT-ONBOARDING], history: [change-006] }

  # data
  # Entities → project/map/data/platform/ (ENT-WORKSPACE, ENT-WS-MEMBERSHIP, ENT-WS-BRANDING,
  #   ENT-WS-INVITATION, ENT-ONBOARDING; used by the services above via deps)

  # surfaces
  - { id: EP-WS-01, kind: surface, subtype: rest.post, route: /api/v1/workspaces, auth: authenticated, status: implemented, calls: [SVC-WS.createWorkspace], receives: [DTO-WS-01-REQ], returns: [DTO-WS-01-RES], spec: { request: { body: DTO-WS-01-REQ }, response: { status: 201, body: DTO-WS-01-RES } } }
  - { id: EP-WS-02, kind: surface, subtype: rest.get, route: /api/v1/workspaces/me, auth: authenticated, status: implemented, calls: [SVC-WS.listUserWorkspaces], returns: [DTO-WS-02-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-WS-02-RES } } }
  - { id: EP-WS-03, kind: surface, subtype: rest.get, route: /api/v1/workspaces/slug-availability, auth: authenticated, status: implemented, calls: [SVC-WS.checkSlugAvailability], returns: [DTO-WS-03-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-WS-03-RES } } }
  - { id: EP-WS-04, kind: surface, subtype: rest.get, route: /api/v1/workspaces/:id, auth: "ws-role:member", status: implemented, calls: [SVC-WS.getWorkspace], returns: [DTO-WS-04-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-WS-04-RES } } }
  - { id: EP-WS-05, kind: surface, subtype: rest.patch, route: /api/v1/workspaces/:id, auth: "ws-role:owner", status: implemented, calls: [SVC-WS.updateWorkspace], receives: [DTO-WS-05-REQ], returns: [DTO-WS-05-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-WS-05-REQ }, response: { status: 200, body: DTO-WS-05-RES } } }
  - { id: EP-WS-06, kind: surface, subtype: rest.delete, route: /api/v1/workspaces/:id, auth: "ws-role:owner", status: implemented, calls: [SVC-WS.deleteWorkspace], returns: [DTO-WS-06-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-WS-06-RES } } }
  - { id: EP-WS-07, kind: surface, subtype: rest.post, route: /api/v1/workspaces/switch, auth: authenticated, status: implemented, calls: [SVC-WS.switchWorkspace], receives: [DTO-WS-07-REQ], returns: [DTO-WS-07-RES], spec: { request: { body: DTO-WS-07-REQ }, response: { status: 201, body: DTO-WS-07-RES } } }
  - { id: EP-WS-08, kind: surface, subtype: rest.get, route: /api/v1/workspaces/:id/members, auth: "ws-role:member", status: implemented, calls: [SVC-WS-MEMBER.listMembers], returns: [DTO-WS-08-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-WS-08-RES } } }
  - { id: EP-WS-09, kind: surface, subtype: rest.delete, route: /api/v1/workspaces/:id/members/:userId, auth: "ws-role:owner", status: implemented, calls: [SVC-WS-MEMBER.removeMember], returns: [DTO-WS-09-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }, { name: userId, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-WS-09-RES } } }
  - { id: EP-WS-10, kind: surface, subtype: rest.patch, route: /api/v1/workspaces/:id/members/:userId/role, auth: "ws-role:owner", status: implemented, calls: [SVC-WS-MEMBER.changeRole], receives: [DTO-WS-10-REQ], returns: [DTO-WS-10-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }, { name: userId, in: path, type: ObjectId, required: true }], body: DTO-WS-10-REQ }, response: { status: 200, body: DTO-WS-10-RES } } }
  - { id: EP-WS-11, kind: surface, subtype: rest.post, route: /api/v1/workspaces/:id/invite, auth: "ws-role:owner", status: implemented, calls: [SVC-WS-INVITE.invite], rules: [RULE-SUB-001], history: [change-009], receives: [DTO-WS-11-REQ], returns: [DTO-WS-11-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-WS-11-REQ }, response: { status: 201, body: DTO-WS-11-RES } } }
  - { id: EP-WS-12, kind: surface, subtype: rest.get, route: /api/v1/workspaces/:id/invitations, auth: "ws-role:member", status: implemented, calls: [SVC-WS-INVITE.listInvitations], returns: [DTO-WS-12-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-WS-12-RES } } }
  - { id: EP-WS-13, kind: surface, subtype: rest.post, route: /api/v1/workspaces/invitations/:invitationId/resend, auth: "ws-role:owner", status: implemented, calls: [SVC-WS-INVITE.resendInvite], history: [change-007], receives: [DTO-WS-13-REQ], returns: [DTO-WS-13-RES], spec: { request: { params: [{ name: invitationId, in: path, type: ObjectId, required: true }], body: DTO-WS-13-REQ }, response: { status: 201, body: DTO-WS-13-RES } } }
  - { id: EP-WS-14, kind: surface, subtype: rest.delete, route: /api/v1/workspaces/invitations/:invitationId, auth: "ws-role:owner", status: implemented, calls: [SVC-WS-INVITE.revokeInvite], returns: [DTO-WS-14-RES], spec: { request: { params: [{ name: invitationId, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-WS-14-RES } } }
  - { id: EP-WS-15, kind: surface, subtype: rest.get, route: /api/v1/workspaces/invitation/accept, auth: public, status: implemented, calls: [SVC-WS-INVITE.acceptInvitation], rules: [RULE-GLOBAL-011], history: [change-006], returns: [DTO-WS-15-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-WS-15-RES } } }
  - { id: EP-WS-16, kind: surface, subtype: rest.get, route: /api/v1/workspaces/:id/branding, auth: "ws-role:member", status: implemented, calls: [SVC-WS-BRAND.getBranding], returns: [DTO-WS-16-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-WS-16-RES } } }
  - { id: EP-WS-17, kind: surface, subtype: rest.post, route: /api/v1/workspaces/:id/branding/logo, auth: "ws-role:owner", status: implemented, calls: [SVC-WS-BRAND.uploadLogo], rules: [RULE-GLOBAL-009], receives: [DTO-WS-17-REQ], returns: [DTO-WS-17-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-WS-17-REQ }, response: { status: 201, body: DTO-WS-17-RES } } }
  - { id: EP-WS-18, kind: surface, subtype: rest.delete, route: /api/v1/workspaces/:id/branding/logo, auth: "ws-role:owner", status: implemented, calls: [SVC-WS-BRAND.deleteLogo], returns: [DTO-WS-18-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }] }, response: { status: 200, body: DTO-WS-18-RES } } }
  - { id: EP-WS-19, kind: surface, subtype: rest.patch, route: /api/v1/workspaces/:id/branding/color-template, auth: "ws-role:owner", status: implemented, calls: [SVC-WS-BRAND.selectColorTemplate], receives: [DTO-WS-19-REQ], returns: [DTO-WS-19-RES], spec: { request: { params: [{ name: id, in: path, type: ObjectId, required: true }], body: DTO-WS-19-REQ }, response: { status: 200, body: DTO-WS-19-RES } } }
  - { id: EP-WS-20, kind: surface, subtype: rest.get, route: /api/v1/onboarding/progress, auth: authenticated, status: implemented, calls: [SVC-WS-ONBOARD.getProgress], returns: [DTO-WS-20-RES], spec: { request: { query: [{ name: page, type: number, required: false }, { name: limit, type: number, required: false }] }, response: { status: 200, body: DTO-WS-20-RES } } }
  - { id: EP-WS-21, kind: surface, subtype: rest.patch, route: /api/v1/onboarding/progress, auth: authenticated, status: implemented, calls: [SVC-WS-ONBOARD.updateProgress], receives: [DTO-WS-21-REQ], returns: [DTO-WS-21-RES], spec: { request: { body: DTO-WS-21-REQ }, response: { status: 200, body: DTO-WS-21-RES } } }
  # frontend
  - { id: PAGE-WORKSPACE-SETTINGS, kind: ui, subtype: page, app: customer-portal, route: /app/workspace, status: implemented,
      calls: [EP-WS-04, EP-WS-05, EP-WS-08, EP-WS-11, EP-WS-16, EP-WS-17, EP-WS-19], renders: [CMP-MEMBER-LIST, CMP-BRAND-PICKER],
      theme: THEME-ROYA, i18n: true, rtl: true, states: [loading, error, ready], history: [change-004, change-008] }
  - { id: PAGE-ONBOARDING, kind: ui, subtype: page, app: customer-portal, route: /app/onboarding, status: implemented,
      calls: [EP-WS-20, EP-WS-21], theme: THEME-ROYA, i18n: true, rtl: true, states: [ready], history: [change-006] }
  - { id: PAGE-ACCEPT-INVITE, kind: ui, subtype: page, app: customer-portal, route: /workspaces/accept, status: implemented,
      calls: [EP-WS-15], theme: THEME-ROYA, i18n: true, rtl: true, states: [ready, error], history: [change-006, change-007] }
  - { id: CMP-MEMBER-LIST, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA }
  - { id: CMP-BRAND-PICKER, kind: ui, subtype: component, app: customer-portal, status: implemented, theme: THEME-ROYA }
