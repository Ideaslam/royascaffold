# All rules, referenced by ID from node.rules[]. verify proves every reference resolves.
rules:
  # --- adopted generic (from engine/rules/catalog.yaml) ---
  - { id: RULE-PAG-01, scope: global, title: Pagination contract, applies_to: [surface],
      constraint: "List endpoints paginate via ?page&limit; response { items, page, limit, total }; cap limit at 100" }
  - { id: RULE-SECRET-01, scope: global, title: Never expose secrets, applies_to: [logic, integration, surface],
      constraint: "Credentials encrypted at rest; never returned in a response or logged" }

  # --- global (RULE-GLOBAL-*) ---
  - { id: RULE-GLOBAL-002, scope: global, title: AI never reads data rows, applies_to: [logic],
      constraint: "No AI prompt includes raw rows; AI gets only column names, types, descriptions, sample stats" }
  - { id: RULE-GLOBAL-003, scope: global, title: Integration layer enforcement, applies_to: [logic, integration],
      constraint: "All third-party SDKs called only through src/integrations/; depend on interfaces, not SDK classes" }
  - { id: RULE-GLOBAL-004, scope: global, title: Background job for slow work, applies_to: [surface, logic],
      constraint: "Slow work (ingest, AI, export, recalc) runs on a BullMQ queue; never blocks an HTTP request" }
  - { id: RULE-GLOBAL-005, scope: global, title: Background job status tracking, applies_to: [flow, logic],
      constraint: "Every job writes a backgroundjobs doc; finalizes completed/failed with errorMessage" }
  - { id: RULE-GLOBAL-006, scope: global, title: Cache invalidation on data change, applies_to: [logic],
      constraint: "Any op changing dashboard data invalidates Redis + Mongo cache for its widgets before returning" }
  - { id: RULE-GLOBAL-009, scope: global, title: Secret handling, applies_to: [logic, integration, surface],
      constraint: "No secrets in code, responses, INFO+ logs, or frontend bundles; all from env, validated at startup" }
  - { id: RULE-GLOBAL-011, scope: global, title: Rate limiting, applies_to: [surface],
      constraint: "Auth 10/min/IP; data refresh per tier; else 100/min per authenticated user" }

  # --- auth (module) ---
  - { id: RULE-AUTH-001, scope: module, module: auth, title: Registration security, applies_to: [logic],
      constraint: "bcrypt 12 rounds; unique email at service layer; never store/return passwordHash; default role editor" }
  - { id: RULE-AUTH-003, scope: module, module: auth, title: Token refresh security, applies_to: [logic],
      constraint: "Rotate refresh token on every use (single-use); store hash server-side; strict expiry" }

  # --- data (module) ---
  - { id: RULE-CRED-PATH-01, scope: module, module: data, title: Credential resolution path, applies_to: [logic],
      constraint: "Resolve credentials dataset -> dataSource -> connection; connectors get decrypted creds + scope; secrets never returned" }
  - { id: RULE-DATA-001, scope: module, module: data, title: CSV upload storage, applies_to: [logic, surface],
      constraint: "Validate CSV type + <=50MB; stream to R2; per-CSV dynamic collection; batch inserts; never rows in csvfiles doc" }
  - { id: RULE-DATA-003, scope: module, module: data, title: Column confirmation gate, applies_to: [logic],
      constraint: "Block dashboard generation until all columns user_confirmed; never overwrite a confirmed description" }
  - { id: RULE-DATA-004, scope: module, module: data, title: Connector engine terminology + reuse, applies_to: [logic, surface],
      constraint: "Connection=auth only; Data Source=name+connectionId+scope; Table=Dataset; never conflate; test must pass before save; delete guards" }
  - { id: RULE-DATA-005, scope: module, module: data, title: Column selection + blocked columns, applies_to: [logic],
      constraint: "availableColumns=full; live schema=confirmed selected only; blocked never selectable; confirm-selection is the only prune path" }

  # --- dashboards (module) — with a performance target attached (RULE.performance) ---
  - { id: RULE-DASH-001, scope: module, module: dashboards, title: Chart data API caching, applies_to: [surface, logic],
      performance: { cached_ms: 200, uncached_ms: 2000 },
      constraint: "Redis -> chartdatacache -> aggregate; cache both (TTL 1h); enforce ownership/share token; 200 empty on zero results" }

  # --- architecture (RULE-ARCH-*) ---
  - { id: RULE-ARCH-001, scope: architecture, title: Contract-driven engine boundaries, applies_to: [logic, surface],
      constraint: "Callers depend on a domain's public contract only; no cross-engine internal imports; no upward import into apps/api" }
  - { id: RULE-ARCH-002, scope: architecture, title: Neutral engine core, applies_to: [logic, flow],
      constraint: "engine-core has no feature knowledge (no dataset/dashboard/connector/OLAP imports); persistence via PIPELINE_RUN_STORE seam" }
  - { id: RULE-ARCH-006, scope: architecture, title: Extend by registration, applies_to: [integration, flow, logic],
      constraint: "New connector/step/pipeline-type/olap-engine = implement interface + one registry entry in the owning engine; no kernel edit" }

  # --- more global (RULE-GLOBAL-*) ---
  - { id: RULE-GLOBAL-001, scope: global, title: AI provider isolation, applies_to: [logic, integration],
      constraint: "Only ai-processing may call the AI integration; no other module imports the AI provider" }
  - { id: RULE-GLOBAL-007, scope: global, title: Subscription limit enforcement, applies_to: [surface, logic],
      constraint: "Dashboard create / upload / refresh check limits via SubscriptionLimitService after auth, before writes; 403 with message" }
  - { id: RULE-GLOBAL-008, scope: global, title: GDPR data deletion, applies_to: [logic],
      constraint: "User deletion cascades across all modules via deleteUserData(userId); complete within 30 days" }
  - { id: RULE-GLOBAL-010, scope: global, title: Audit logging, applies_to: [logic, surface],
      constraint: "All create/update/delete/share/export/login events -> immutable auditlogs via AuditService; controllers never write directly" }

  # --- architecture (more RULE-ARCH-*) ---
  - { id: RULE-ARCH-003, scope: architecture, title: Explicit tenant context, applies_to: [logic],
      constraint: "Tenant scope carried by TenantContext, resolved once at the edge and injected; new engine code consumes it" }
  - { id: RULE-ARCH-004, scope: architecture, title: Pluggable sync lifecycle hooks, applies_to: [logic, flow],
      constraint: "Post-sync concerns (filter refresh, notifications, metering) register as hooks; never hardwired into the sync processor" }
  - { id: RULE-ARCH-005, scope: architecture, title: Delivery is an adapter, applies_to: [surface, logic],
      constraint: "Business logic lives in engines; REST/MCP delivery is a swappable adapter supplying a valid TenantContext" }

  # --- auth ---
  - { id: RULE-AUTH-OAUTH-01, scope: module, module: auth, title: OAuth login integration, applies_to: [logic, integration],
      constraint: "OAuth 2.0 auth-code flow server-side; link by email or create editor; issue JWT via same token service; secrets in env only" }
  - { id: RULE-AUTH-VERIFY-01, scope: module, module: auth, title: Email verification enforcement, applies_to: [logic, surface],
      constraint: "Email/password signups verify before mutating actions; 403 EMAIL_NOT_VERIFIED; OAuth auto-verified; token 24h; resend 5min" }

  # --- ai-processing ---
  - { id: RULE-AI-001, scope: module, module: ai-processing, title: CSV column analysis job, applies_to: [logic, flow],
      constraint: "Consume csv-analysis queue; load column metadata only (no rows); one AI call per job; update backgroundjobs" }
  - { id: RULE-AI-002, scope: module, module: ai-processing, title: Dashboard generation job, applies_to: [logic, flow],
      constraint: "Consume dashboard-generation queue; validate AI JSON against widget schema; all-or-none widget creation; 3 retries" }

  # --- dashboards ---
  - { id: RULE-DASH-002, scope: module, module: dashboards, title: Manual data refresh, applies_to: [surface, logic],
      constraint: "Check tier refresh limits; invalidate Redis + chartdatacache; re-execute async; 429 with wait on exceed" }
  - { id: RULE-DASH-003, scope: module, module: dashboards, title: Customization cache invalidation, applies_to: [logic],
      constraint: "Invalidate cache for any widget whose queryDefinition/aggregation changes; owner/edit-share only; never re-trigger AI" }

  # --- sharing ---
  - { id: RULE-SHARE-001, scope: module, module: sharing, title: Share link token security, applies_to: [logic],
      constraint: "Tokens crypto-random >=32 bytes URL-safe; store hash not raw; enforce viewerCanRefresh at API level" }
  - { id: RULE-SHARE-002, scope: module, module: sharing, title: Shared access validation, applies_to: [surface, logic],
      constraint: "Validate share token + expiry + permission on EVERY request; chart data allowed via token; never expose internal ids" }

  # --- export ---
  - { id: RULE-EXPORT-001, scope: module, module: export, title: PDF export async job, applies_to: [surface, logic, flow],
      constraint: "Queue pdf_export; render server-side; upload to R2; return signed URL (TTL 24h); never block HTTP thread or return raw bytes" }
  - { id: RULE-EXPORT-002, scope: module, module: export, title: Excel export performance, applies_to: [logic],
      constraint: "Fetch aggregated widget data (not raw rows); stream for >100K rows; never load unlimited rows in memory" }

  # --- notifications ---
  - { id: RULE-NOTIF-001, scope: module, module: notifications, title: Email via MailJet integration, applies_to: [logic, integration],
      constraint: "All emails via src/integrations/mail/ only; fire-and-forget (failure must not fail primary op); no secrets/tokens in email" }

  # --- subscriptions ---
  - { id: RULE-SUB-001, scope: module, module: subscriptions, title: Payment integration (PayUp), applies_to: [logic, integration, surface],
      constraint: "Adapter via PaymentProvider; activate only after confirmed payment via durable event; free plans skip PayUp; never store card data" }
  - { id: RULE-SUB-002, scope: module, module: subscriptions, title: Account + subscription status enforcement, applies_to: [logic, surface],
      constraint: "Suspended account -> 403 ACCOUNT_SUSPENDED; resource lock -> 403 SUBSCRIPTION_LOCKED; usage limits via registry; never conflate" }

  # --- canonical templates ---
  - { id: RULE-TPL-001, scope: module, module: templates, title: Template catalog integrity, applies_to: [logic],
      constraint: "Catalog is global + admin-owned; querySpecs reference only canonical fields; validate on create/update + at seed" }
  - { id: RULE-TPL-002, scope: module, module: templates, title: Canonical union views, applies_to: [logic, flow],
      constraint: "Views cv_{ws}_{flag} created only by ensure-canonical-views step; mappings must cover usedFields; create-or-replace" }
  - { id: RULE-TPL-003, scope: module, module: templates, title: Template pipeline reuse, applies_to: [flow],
      constraint: "dashboard-from-template is a pipeline type (reuses steps + one registry entry); no engine/worker change; AI adaptation non-fatal" }

  # --- workspace scoping (used by change-072) ---
  - { id: RULE-WS-SCOPE-01, scope: global, title: Workspace scoping, applies_to: [data, surface, logic],
      constraint: "Workspace-scoped data carries a workspace reference and every query filters by it; never leak cross-workspace rows" }
