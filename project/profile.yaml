# System profile — the one home for concrete facts. The engine refers to these, never hardcodes them.
product:
  name: Roya AI Dynamo
  summary: AI-powered SaaS that turns multi-source data into interactive dashboards automatically.
  type: SaaS responsive web application

# The stack subtype vocabulary — what the universal `kind`s mean for THIS system.
subtypes:
  surface: [rest.get, rest.post, rest.put, rest.patch, rest.delete, webhook, oauth-callback]
  ui: [page, component, layout, theme, tokens, i18n]
  logic: [service, worker, cron, guard, registry, repository]
  contract: [interface]
  data: [entity, collection, dto]     # dto = request/response payload shape (carries fields; linked from surfaces)
  integration: [oauth, sdk]
  flow: [queue, worker, cron, pipeline, migration]

# ID prefix -> kind alias table. Keeps IDs readable while the engine only cares about `kind`.
id_prefixes:
  EP: surface
  PAGE: ui
  CMP: ui
  SVC: logic
  IF: contract
  ENT: data
  DTO: data
  Q: flow
  MIG: flow
  RULE: rule
  BND: boundary
  DOM: domain
  FEAT: feature
  MOD: module

# Apps / repositories. Every implementation node belongs to one or more of these (its `app` or
# `apps: [...]`). Server-side nodes (surface/logic/data/contract/integration/flow) default to
# `default_app` below; UI nodes carry their own `app`/`apps`; features & modules span the union of
# their members. `side` + `label` are for the viewer's app tree.
apps:
  - { key: customer-portal, label: "Customer Portal", side: frontend, type: web, repo: roya-ai-dynamo-frontend, framework: Angular 21, ui: PrimeNG 21 }
  - { key: admin-panel, label: "Admin Panel", side: frontend, type: web, repo: roya-ai-dynamo-frontend-admin, framework: Angular 21, ui: PrimeNG 21 }
  - { key: backend, label: "API", side: backend, type: api, repo: roya-ai-dynamo-api, framework: NestJS }
  - { key: landing-site, label: "Landing", side: frontend, type: web-static, repo: roya-dynamo-landing, framework: HTML+Tailwind }

# Server-side nodes belong here unless a node overrides with its own `app`/`apps`.
default_app: backend

# Verify uses these to run map<->code drift and the size budget. Absent here (code lives in other
# repos), so verify reports drift + size as SKIPPED — honest, not a failure.
code_roots:
  - ../roya-ai-dynamo-api/src
map_size_budget: 0.6    # spec-carrying blueprint; guards against unstructured duplication, not richness

# Inherited defaults. A node `spec` documents a value ONLY when it DEVIATES from these — so the
# blueprint stays complete (build-ready) without repeating the same envelope/auth/states everywhere.
conventions:
  api:
    route_prefix: /api/v1
    auth_default: "JwtAuthGuard + RolesGuard (global)"
    workspace_auth: "WorkspaceRoleGuard + @WorkspaceRoles() when workspace-scoped"
    success_envelope: "{ success: true, data }"
    error_envelope: "{ success: false, message, error?, statusCode }"
    pagination: "?page=1&limit=20 -> { data[], total, page, limit }; cap limit 100"
    validation: "class-validator DTOs + global ValidationPipe (whitelist, forbidNonWhitelisted)"
    rate_limit: "auth 10/min/IP · data refresh per tier · else 100/min/user"
  ui:
    states: [loading, empty, error, success]   # every data-driven page handles all four
    error_ux: "toast via shared toast service"
    api_base: "environment.apiUrl (no direct third-party calls from the client)"
    guards: [AuthGuard, GuestGuard, AdminGuard, WorkspaceGuard]
  naming:
    entity: "PascalCase singular"
    collection: "lowercase plural"
    dto: "PascalCase + Dto"
    service: "PascalCase + Service"

brand_tokens:
  roya-main: "#ff6043"
  roya-primary: "#5922ea"
  roya-secondary: "#282828"

integrations:
  - { id: INT-AI, provider: Claude, purpose: analysis + dashboard generation, env: [AI_MODEL, AI_API_KEY] }
  - { id: INT-MAIL, provider: MailJet, purpose: transactional email, env: [MAILJET_API_KEY, MAILJET_SECRET] }
  - { id: INT-STORAGE, provider: Cloudflare R2, purpose: object storage, env: [R2_ACCESS_KEY, R2_SECRET_KEY, R2_BUCKET] }
  - { id: INT-PAY, provider: PayUp, purpose: subscription billing, env: [PAYMENT_PROVIDER, PAYUP_PUBLIC_KEY, PAYUP_SECRET_KEY] }
  - { id: INT-REDIS, provider: Redis, purpose: cache + BullMQ queues, env: [REDIS_URL] }
